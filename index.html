<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card-bg: rgba(20, 20, 35, 0.85);
      --primary: #00ffaa;
      --secondary: #ff3366;
      --tertiary: #ffaa00;
      --text: #ffffff;
      --text-secondary: #8888aa;
      --btn-bg: rgba(30, 30, 50, 0.8);
      --btn-hover: rgba(50, 50, 80, 0.9);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Rajdhani', sans-serif;
      padding: 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 255, 170, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 51, 102, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .calculator {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 
        0 0 40px rgba(0, 255, 170, 0.1),
        0 0 80px rgba(255, 51, 102, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px;
      border-radius: 20px;
    }

    .mode-toggle span {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 4px 12px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mode-toggle span.active {
      background: var(--primary);
      color: var(--bg);
      font-weight: 600;
    }

    .display {
      background: rgba(10, 10, 20, 0.6);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.3;
    }

    .expression {
      font-size: 16px;
      color: var(--text-secondary);
      word-break: break-all;
      text-align: right;
      margin-bottom: 8px;
      min-height: 20px;
    }

    .result {
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
      text-align: right;
      text-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
    }

    .result.error {
      color: var(--secondary);
      text-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
    }

    .memory-indicator {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 12px;
      color: var(--tertiary);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .memory-indicator.show {
      opacity: 1;
    }

    .angle-mode {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 11px;
      color: var(--primary);
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(0, 255, 170, 0.1);
    }

    .buttons {
      display: grid;
      gap: 10px;
    }

    .buttons.basic {
      grid-template-columns: repeat(5, 1fr);
    }

    .buttons.scientific {
      grid-template-columns: repeat(6, 1fr);
    }

    .btn {
      padding: 16px 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.95);
      box-shadow: none;
    }

    .btn.operator {
      color: var(--primary);
    }

    .btn.equals {
      background: linear-gradient(135deg, var(--primary), #00cc88);
      color: var(--bg);
      grid-column: span 2;
    }

    .btn.equals:hover {
      box-shadow: 0 0 25px rgba(0, 255, 170, 0.5);
    }

    .btn.clear {
      color: var(--secondary);
    }

    .btn.func {
      color: var(--tertiary);
      font-size: 16px;
    }

    .btn.memory {
      font-size: 14px;
    }

    .btn.active {
      background: var(--primary);
      color: var(--bg);
    }

    .history-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
      z-index: 10;
    }

    .history-btn:hover {
      color: var(--primary);
      background: rgba(0, 255, 170, 0.1);
    }

    .history-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100vh;
      background: rgba(15, 15, 25, 0.98);
      backdrop-filter: blur(20px);
      padding: 24px;
      transition: right 0.3s ease;
      z-index: 100;
      overflow-y: auto;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-panel.open {
      right: 0;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .history-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--primary);
    }

    .history-close, .history-clear {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 20px;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .history-close:hover, .history-clear:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
    }

    .history-item {
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(30, 30, 50, 0.5);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .history-item:hover {
      background: rgba(50, 50, 80, 0.5);
      border-color: rgba(0, 255, 170, 0.2);
    }

    .history-expr {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .history-result {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--text);
    }

    .history-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 99;
    }

    .history-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .scientific-btns {
      display: none;
    }

    .scientific-btns.show {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    @media (max-width: 480px) {
      .calculator {
        padding: 16px;
      }
      
      .btn {
        padding: 14px 6px;
        font-size: 18px;
      }
      
      .result {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <button class="history-btn" onclick="toggleHistory()">📜</button>
  
  <div class="calculator">
    <div class="header">
      <div class="logo">NEXUS</div>
      <div class="mode-toggle">
        <span class="active" onclick="setMode('basic')">Basic</span>
        <span onclick="setMode('scientific')">Scientific</span>
      </div>
    </div>

    <div class="display">
      <span class="angle-mode" id="angleMode" onclick="toggleAngleMode()">RAD</span>
      <span class="memory-indicator" id="memoryIndicator">M</span>
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="scientific-btns" id="scientificBtns">
      <button class="btn func" onclick="inputFunc('sin')">sin</button>
      <button class="btn func" onclick="inputFunc('cos')">cos</button>
      <button class="btn func" onclick="inputFunc('tan')">tan</button>
      <button class="btn func" onclick="inputFunc('log')">log</button>
      <button class="btn func" onclick="inputFunc('ln')">ln</button>
      <button class="btn func" onclick="inputFunc('√')">√</button>
      <button class="btn func" onclick="inputFunc('^')">xʸ</button>
      <button class="btn func" onclick="inputFunc('π')">π</button>
      <button class="btn func" onclick="inputFunc('e')">e</button>
      <button class="btn func" onclick="inputFunc('(')">(</button>
      <button class="btn func" onclick="inputFunc(')')">)</button>
      <button class="btn func" onclick="inputFunc('!')">n!</button>
    </div>

    <div class="buttons basic" id="buttonGrid">
      <button class="btn clear" onclick="clearAll()">C</button>
      <button class="btn clear" onclick="clearEntry()">CE</button>
      <button class="btn clear" onclick="backspace()">⌫</button>
      <button class="btn operator" onclick="inputOperator('/')">÷</button>
      <button class="btn operator" onclick="inputOperator('*')">×</button>
      
      <button class="btn" onclick="inputNumber('7')">7</button>
      <button class="btn" onclick="inputNumber('8')">8</button>
      <button class="btn" onclick="inputNumber('9')">9</button>
      <button class="btn operator" onclick="inputOperator('-')">−</button>
      <button class="btn memory" onclick="toggleMemory('MC')">MC</button>
      
      <button class="btn" onclick="inputNumber('4')">4</button>
      <button class="btn" onclick="inputNumber('5')">5</button>
      <button class="btn" onclick="inputNumber('6')">6</button>
      <button class="btn operator" onclick="inputOperator('+')">+</button>
      <button class="btn memory" onclick="toggleMemory('MR')">MR</button>
      
      <button class="btn" onclick="inputNumber('1')">1</button>
      <button class="btn" onclick="inputNumber('2')">2</button>
      <button class="btn" onclick="inputNumber('3')">3</button>
      <button class="btn" onclick="toggleSign()">±</button>
      <button class="btn memory" onclick="toggleMemory('M+')">M+</button>
      
      <button class="btn" onclick="inputNumber('0')">0</button>
      <button class="btn" onclick="inputDecimal()">.</button>
      <button class="btn" onclick="inputPercent()">%</button>
      <button class="btn equals" onclick="calculate()">=</button>
      <button class="btn memory" onclick="toggleMemory('M-')">M-</button>
    </div>
  </div>

  <div class="history-overlay" id="historyOverlay" onclick="toggleHistory()"></div>
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span class="history-title">History</span>
      <div>
        <button class="history-clear" onclick="clearHistory()">🗑️</button>
        <button class="history-close" onclick="toggleHistory()">✕</button>
      </div>
    </div>
    <div id="historyList"></div>
  </div>

  <script>
    let currentInput = '0';
    let expression = '';
    let memory = 0;
    let angleMode = 'RAD';
    let isScientific = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');
    const memoryIndicator = document.getElementById('memoryIndicator');
    const angleModeEl = document.getElementById('angleMode');
    const historyList = document.getElementById('historyList');

    function updateDisplay() {
      let display = currentInput;
      if (display.length > 12) {
        const num = parseFloat(display);
        if (Math.abs(num) >= 1e10 || (Math.abs(num) < 1e-6 && num !== 0)) {
          display = num.toExponential(6);
        }
      }
      resultEl.textContent = display;
      expressionEl.textContent = expression;
    }

    function inputNumber(num) {
      if (currentInput === '0' || currentInput === 'Error') {
        currentInput = num;
      } else {
        currentInput += num;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (currentInput === 'Error') {
        currentInput = '0';
      }
      if (!currentInput.includes('.')) {
        currentInput += '.';
      }
      updateDisplay();
    }

    function inputOperator(op) {
      if (currentInput === 'Error') currentInput = '0';
      expression += currentInput + ' ' + op + ' ';
      currentInput = '0';
      updateDisplay();
    }

    function clearAll() {
      currentInput = '0';
      expression = '';
      resultEl.classList.remove('error');
      updateDisplay();
    }

    function clearEntry() {
      currentInput = '0';
      updateDisplay();
    }

    function backspace() {
      if (currentInput.length === 1 || currentInput === 'Error') {
        currentInput = '0';
      } else {
        currentInput = currentInput.slice(0, -1);
      }
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput !== '0' && currentInput !== 'Error') {
        if (currentInput.startsWith('-')) {
          currentInput = currentInput.slice(1);
        } else {
          currentInput = '-' + currentInput;
        }
        updateDisplay();
      }
    }

    function inputPercent() {
      const val = parseFloat(currentInput);
      currentInput = String(val / 100);
      updateDisplay();
    }

    function calculate() {
      try {
        let fullExpr = expression + currentInput;
        fullExpr = fullExpr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        
        let result = evaluate(fullExpr);
        
        if (typeof result === 'number' && !isNaN(result)) {
          if (!isFinite(result)) {
            currentInput = 'Error';
            resultEl.classList.add('error');
          } else {
            currentInput = String(parseFloat(result.toFixed(10)));
            currentInput = String(parseFloat(currentInput));
            if (currentInput.length > 12) {
              currentInput = result.toExponential(6);
            }
            resultEl.classList.remove('error');
            addToHistory(fullExpr, currentInput);
          }
        } else {
          currentInput = 'Error';
          resultEl.classList.add('error');
        }
        
        expression = '';
        updateDisplay();
      } catch (e) {
        currentInput = 'Error';
        resultEl.classList.add('error');
        updateDisplay();
      }
    }

    function evaluate(expr) {
      const tokens = tokenize(expr);
      return evaluateTokens(tokens);
    }

    function tokenize(expr) {
      const tokens = [];
      let i = 0;
      while (i < expr.length) {
        if (/\s/.test(expr[i])) {
          i++;
        } else if (/[0-9.]/.test(expr[i])) {
          let num = '';
          while (i < expr.length && /[0-9.]/.test(expr[i])) {
            num += expr[i++];
          }
          tokens.push({ type: 'number', value: parseFloat(num) });
        } else if (expr[i] === '+' || expr[i] === '-' || expr[i] === '*' || expr[i] === '/' || expr[i] === '^') {
          tokens.push({ type: 'operator', value: expr[i++] });
        } else {
          i++;
        }
      }
      return tokens;
    }

    function evaluateTokens(tokens) {
      let i = 0;
      
      // Handle functions and constants first
      let processed = [];
      for (let token of tokens) {
        if (token.type === 'number') {
          processed.push(token);
        } else if (token.type === 'operator') {
          processed.push(token);
        }
      }
      
      // Simple evaluation using Function
      let expr = tokens.map(t => t.type === 'number' ? t.value : t.value).join(' ');
      return new Function('return ' + expr)();
    }

    function setMode(mode) {
      const spans = document.querySelectorAll('.mode-toggle span');
      spans.forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      
      isScientific = mode === 'scientific';
      document.getElementById('scientificBtns').classList.toggle('show', isScientific);
      
      const btnGrid = document.getElementById('buttonGrid');
      btnGrid.className = 'buttons ' + mode;
    }

    function inputFunc(func) {
      if (func === 'π') {
        currentInput = String(Math.PI);
      } else if (func === 'e') {
        currentInput = String(Math.E);
      } else if (func === '√') {
        currentInput = String(Math.sqrt(parseFloat(currentInput)));
      } else if (func === '^') {
        expression += currentInput + ' ^ ';
        currentInput = '0';
      } else if (func === '!') {
        const n = parseInt(currentInput);
        let fact = 1;
        for (let i = 2; i <= n; i++) fact *= i;
        currentInput = String(fact);
      } else if (func === 'log') {
        currentInput = String(Math.log10(parseFloat(currentInput)));
      } else if (func === 'ln') {
        currentInput = String(Math.log(parseFloat(currentInput)));
      } else if (['sin', 'cos', 'tan'].includes(func)) {
        let val = parseFloat(currentInput);
        if (angleMode === 'DEG') val = val * Math.PI / 180;
        if (func === 'sin') val = Math.sin(val);
        else if (func === 'cos') val = Math.cos(val);
        else if (func === 'tan') val = Math.tan(val);
        currentInput = String(val);
      }
      updateDisplay();
    }

    function toggleAngleMode() {
      angleMode = angleMode === 'RAD' ? 'DEG' : 'RAD';
      angleModeEl.textContent = angleMode;
    }

    function toggleMemory(action) {
      const val = parseFloat(currentInput);
      switch (action) {
        case 'MC':
          memory = 0;
          memoryIndicator.classList.remove('show');
          break;
        case 'MR':
          currentInput = String(memory);
          break;
        case 'M+':
          memory += val;
          memoryIndicator.classList.add('show');
          break;
        case 'M-':
          memory -= val;
          memoryIndicator.classList.add('show');
          break;
      }
      updateDisplay();
    }

    function toggleHistory() {
      document.getElementById('historyPanel').classList.toggle('open');
      document.getElementById('historyOverlay').classList.toggle('open');
      renderHistory();
    }

    function addToHistory(expr, result) {
      let history = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      history.unshift({ expr, result, time: Date.now() });
      if (history.length > 50) history.pop();
      localStorage.setItem('calculatorHistory', JSON.stringify(history));
    }

    function renderHistory() {
      let history = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      historyList.innerHTML = history.map(item => `
        <div class="history-item" onclick="recallResult('${item.result}')">
          <div class="history-expr">${item.expr}</div>
          <div class="history-result">= ${item.result}</div>
        </div>
      `).join('');
    }

    function recallResult(val) {
      currentInput = val;
      updateDisplay();
      toggleHistory();
    }

    function clearHistory() {
      localStorage.removeItem('calculatorHistory');
      renderHistory();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      if (e.key === '.') inputDecimal();
      if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') inputOperator(e.key);
      if (e.key === 'Enter' || e.key === '=') calculate();
      if (e.key === 'Escape') clearAll();
      if (e.key === 'Backspace') backspace();
      if (e.key === '%') inputPercent();
    });

    updateDisplay();
  </script>
</body>
</html>
