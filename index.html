<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalcFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121218;
      --calc-bg: #1e1e2a;
      --display-bg: #252535;
      --primary: #6366f1;
      --primary-light: #818cf8;
      --secondary: #f472b6;
      --accent-orange: #fb923c;
      --accent-cyan: #22d3ee;
      --accent-yellow: #facc15;
      --accent-green: #4ade80;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --btn-bg: #2d2d3d;
      --btn-hover: #3d3d52;
      --shadow: rgba(99, 102, 241, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      padding: 20px;
      gap: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .calculator {
      width: 100%;
      max-width: 380px;
      background: var(--calc-bg);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .mode-toggle {
      display: flex;
      background: var(--btn-bg);
      border-radius: 24px;
      padding: 4px;
    }

    .mode-toggle span {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .mode-toggle span.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
    }

    .display {
      background: var(--display-bg);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .display-top {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 8px;
    }

    .angle-mode {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-cyan);
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(34, 211, 238, 0.1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .angle-mode:hover {
      background: rgba(34, 211, 238, 0.2);
    }

    .memory-indicator {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-yellow);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .memory-indicator.show {
      opacity: 1;
    }

    .expression {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
      word-break: break-all;
      text-align: right;
      min-height: 18px;
    }

    .result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 44px;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
      text-align: right;
      margin-top: 4px;
      max-height: 60px;
      overflow: hidden;
    }

    .result.error {
      color: var(--secondary);
    }

    .scientific-btns {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .scientific-btns.show {
      display: grid;
    }

    .buttons {
      display: grid;
      gap: 10px;
    }

    .buttons.basic {
      grid-template-columns: repeat(5, 1fr);
    }

    .btn {
      padding: 18px 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn.operator {
      color: var(--primary-light);
    }

    .btn.equals {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      grid-column: span 2;
    }

    .btn.equals:hover {
      box-shadow: 0 8px 20px var(--shadow);
    }

    .btn.clear {
      color: var(--secondary);
    }

    .btn.func {
      color: var(--accent-orange);
      font-size: 14px;
      background: rgba(251, 146, 60, 0.1);
    }

    .btn.func:hover {
      background: rgba(251, 146, 60, 0.2);
    }

    .btn.memory {
      font-size: 12px;
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-cyan);
    }

    .btn.memory:hover {
      background: rgba(34, 211, 238, 0.2);
    }

    .btn.active {
      background: var(--primary);
      color: white;
    }

    .history-sidebar {
      width: 280px;
      background: var(--calc-bg);
      border-radius: 28px;
      padding: 20px;
      max-height: 560px;
      display: flex;
      flex-direction: column;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-title::before {
      content: '🕐';
    }

    .history-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .history-clear:hover {
      color: var(--secondary);
      background: rgba(244, 114, 182, 0.1);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-list::-webkit-scrollbar {
      width: 4px;
    }

    .history-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: var(--btn-bg);
      border-radius: 4px;
    }

    .history-item {
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateX(4px);
    }

    .history-expr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      word-break: break-all;
    }

    .history-result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px 20px;
    }

    .history-empty::before {
      content: '📝';
      display: block;
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    @media (max-width: 800px) {
      .history-sidebar {
        display: none;
      }
    }

    @media (max-width: 440px) {
      .calculator {
        padding: 16px;
      }
      
      .btn {
        padding: 14px 8px;
        font-size: 16px;
      }
      
      .result {
        font-size: 36px;
      }
      
      .scientific-btns {
        gap: 6px;
      }
      
      .btn.func {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="calculator">
      <div class="header">
        <div class="logo">CalcFlow</div>
        <div class="mode-toggle">
          <span class="active" onclick="setMode('basic', this)">Basic</span>
          <span onclick="setMode('scientific', this)">Scientific</span>
        </div>
      </div>

      <div class="display">
        <div class="display-top">
          <span class="angle-mode" id="angleMode" onclick="toggleAngleMode()">RAD</span>
          <span class="memory-indicator" id="memoryIndicator">M</span>
        </div>
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="scientific-btns" id="scientificBtns">
        <button class="btn func" onclick="inputFunc('sin')">sin</button>
        <button class="btn func" onclick="inputFunc('cos')">cos</button>
        <button class="btn func" onclick="inputFunc('tan')">tan</button>
        <button class="btn func" onclick="inputFunc('log')">log</button>
        <button class="btn func" onclick="inputFunc('ln')">ln</button>
        <button class="btn func" onclick="inputFunc('√')">√</button>
        <button class="btn func" onclick="inputFunc('^')">xʸ</button>
        <button class="btn func" onclick="inputFunc('π')">π</button>
        <button class="btn func" onclick="inputFunc('e')">e</button>
        <button class="btn func" onclick="inputFunc('(')">(</button>
        <button class="btn func" onclick="inputFunc(')')">)</button>
        <button class="btn func" onclick="inputFunc('!')">n!</button>
      </div>

      <div class="buttons basic" id="buttonGrid">
        <button class="btn clear" onclick="clearAll()">C</button>
        <button class="btn clear" onclick="clearEntry()">CE</button>
        <button class="btn clear" onclick="backspace()">⌫</button>
        <button class="btn operator" onclick="inputOperator('/')">÷</button>
        <button class="btn operator" onclick="inputOperator('*')">×</button>
        
        <button class="btn" onclick="inputNumber('7')">7</button>
        <button class="btn" onclick="inputNumber('8')">8</button>
        <button class="btn" onclick="inputNumber('9')">9</button>
        <button class="btn operator" onclick="inputOperator('-')">−</button>
        <button class="btn memory" onclick="toggleMemory('MC')">MC</button>
        
        <button class="btn" onclick="inputNumber('4')">4</button>
        <button class="btn" onclick="inputNumber('5')">5</button>
        <button class="btn" onclick="inputNumber('6')">6</button>
        <button class="btn operator" onclick="inputOperator('+')">+</button>
        <button class="btn memory" onclick="toggleMemory('MR')">MR</button>
        
        <button class="btn" onclick="inputNumber('1')">1</button>
        <button class="btn" onclick="inputNumber('2')">2</button>
        <button class="btn" onclick="inputNumber('3')">3</button>
        <button class="btn toggle-sign" onclick="toggleSign()">±</button>
        <button class="btn memory" onclick="toggleMemory('M+')">M+</button>
        
        <button class="btn" onclick="inputNumber('0')">0</button>
        <button class="btn" onclick="inputDecimal()">.</button>
        <button class="btn" onclick="inputPercent()">%</button>
        <button class="btn equals" onclick="calculate()">=</button>
        <button class="btn memory" onclick="toggleMemory('M-')">M-</button>
      </div>
    </div>

    <div class="history-sidebar">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="history-clear" onclick="clearHistory()">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No calculations yet<br>Results will appear here</div>
      </div>
    </div>
  </div>

  <script>
    let currentInput = '0';
    let expression = '';
    let memory = 0;
    let angleMode = 'RAD';
    let isScientific = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');
    const memoryIndicator = document.getElementById('memoryIndicator');
    const angleModeEl = document.getElementById('angleMode');
    const historyList = document.getElementById('historyList');

    function updateDisplay() {
      let display = currentInput;
      if (display.length > 12) {
        const num = parseFloat(display);
        if (Math.abs(num) >= 1e10 || (Math.abs(num) < 1e-6 && num !== 0)) {
          display = num.toExponential(6);
        }
      }
      resultEl.textContent = display;
      expressionEl.textContent = expression;
    }

    function inputNumber(num) {
      if (currentInput === '0' || currentInput === 'Error') {
        currentInput = num;
      } else {
        currentInput += num;
      }
      animateResult();
      updateDisplay();
    }

    function inputDecimal() {
      if (currentInput === 'Error') currentInput = '0';
      if (!currentInput.includes('.')) {
        currentInput += '.';
      }
      updateDisplay();
    }

    function inputOperator(op) {
      if (currentInput === 'Error') currentInput = '0';
      expression += currentInput + ' ' + op + ' ';
      currentInput = '0';
      updateDisplay();
    }

    function clearAll() {
      currentInput = '0';
      expression = '';
      resultEl.classList.remove('error');
      updateDisplay();
    }

    function clearEntry() {
      currentInput = '0';
      updateDisplay();
    }

    function backspace() {
      if (currentInput.length === 1 || currentInput === 'Error') {
        currentInput = '0';
      } else {
        currentInput = currentInput.slice(0, -1);
      }
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput !== '0' && currentInput !== 'Error') {
        if (currentInput.startsWith('-')) {
          currentInput = currentInput.slice(1);
        } else {
          currentInput = '-' + currentInput;
        }
        updateDisplay();
      }
    }

    function inputPercent() {
      const val = parseFloat(currentInput);
      currentInput = String(val / 100);
      updateDisplay();
    }

    function calculate() {
      try {
        let fullExpr = expression + currentInput;
        fullExpr = fullExpr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        
        let result = evaluate(fullExpr);
        
        if (typeof result === 'number' && !isNaN(result)) {
          if (!isFinite(result)) {
            currentInput = 'Error';
            resultEl.classList.add('error');
          } else {
            currentInput = String(parseFloat(result.toFixed(10)));
            currentInput = String(parseFloat(currentInput));
            if (currentInput.length > 12) {
              currentInput = result.toExponential(6);
            }
            resultEl.classList.remove('error');
            addToHistory(fullExpr, currentInput);
          }
        } else {
          currentInput = 'Error';
          resultEl.classList.add('error');
        }
        
        expression = '';
        animateResult();
        updateDisplay();
      } catch (e) {
        currentInput = 'Error';
        resultEl.classList.add('error');
        updateDisplay();
      }
    }

    function evaluate(expr) {
      return new Function('return ' + expr)();
    }

    function animateResult() {
      resultEl.style.transform = 'scale(1.02)';
      setTimeout(() => resultEl.style.transform = 'scale(1)', 100);
    }

    function setMode(mode, el) {
      const spans = document.querySelectorAll('.mode-toggle span');
      spans.forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      
      isScientific = mode === 'scientific';
      document.getElementById('scientificBtns').classList.toggle('show', isScientific);
      
      const btnGrid = document.getElementById('buttonGrid');
      btnGrid.className = 'buttons ' + mode;
    }

    function inputFunc(func) {
      try {
        const val = parseFloat(currentInput);
        let result;
        
        switch(func) {
          case 'π': result = Math.PI; break;
          case 'e': result = Math.E; break;
          case '√': result = Math.sqrt(val); break;
          case '^': expression += currentInput + ' ** '; currentInput = '0'; updateDisplay(); return;
          case '!': 
            let fact = 1;
            for (let i = 2; i <= Math.floor(val); i++) fact *= i;
            result = fact;
            break;
          case 'log': result = Math.log10(val); break;
          case 'ln': result = Math.log(val); break;
          case 'sin': result = angleMode === 'DEG' ? Math.sin(val * Math.PI / 180) : Math.sin(val); break;
          case 'cos': result = angleMode === 'DEG' ? Math.cos(val * Math.PI / 180) : Math.cos(val); break;
          case 'tan': result = angleMode === 'DEG' ? Math.tan(val * Math.PI / 180) : Math.tan(val); break;
          default: result = currentInput;
        }
        currentInput = String(result);
      } catch (e) {
        currentInput = 'Error';
        resultEl.classList.add('error');
      }
      updateDisplay();
    }

    function toggleAngleMode() {
      angleMode = angleMode === 'RAD' ? 'DEG' : 'RAD';
      angleModeEl.textContent = angleMode;
    }

    function toggleMemory(action) {
      const val = parseFloat(currentInput) || 0;
      switch (action) {
        case 'MC':
          memory = 0;
          memoryIndicator.classList.remove('show');
          break;
        case 'MR':
          currentInput = String(memory);
          break;
        case 'M+':
          memory += val;
          memoryIndicator.classList.add('show');
          break;
        case 'M-':
          memory -= val;
          memoryIndicator.classList.add('show');
          break;
      }
      updateDisplay();
    }

    function addToHistory(expr, result) {
      let history = JSON.parse(localStorage.getItem('calcFlowHistory') || '[]');
      history.unshift({ expr, result, time: Date.now() });
      if (history.length > 50) history.pop();
      localStorage.setItem('calcFlowHistory', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      let history = JSON.parse(localStorage.getItem('calcFlowHistory') || '[]');
      
      if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">No calculations yet<br>Results will appear here</div>';
        return;
      }
      
      historyList.innerHTML = history.map((item, i) => `
        <div class="history-item" onclick="recallResult('${item.result}')" style="animation: slideIn 0.3s ease ${i * 0.05}s backwards">
          <div class="history-expr">${item.expr}</div>
          <div class="history-result">= ${item.result}</div>
        </div>
      `).join('');
    }

    function recallResult(val) {
      currentInput = val;
      updateDisplay();
    }

    function clearHistory() {
      localStorage.removeItem('calcFlowHistory');
      renderHistory();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      if (e.key === '.') inputDecimal();
      if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') inputOperator(e.key);
      if (e.key === 'Enter' || e.key === '=') calculate();
      if (e.key === 'Escape') clearAll();
      if (e.key === 'Backspace') { e.preventDefault(); backspace(); }
      if (e.key === '%') inputPercent();
    });

    renderHistory();
    updateDisplay();
  </script>
</body>
</html>
