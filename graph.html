<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Calculator - CalcLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .graph-full {
      display: flex;
      gap: 1rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    .graph-sidebar {
      width: 320px;
      flex-shrink: 0;
      background: var(--card-bg);
      border: 3px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      max-height: calc(100vh - 150px);
      overflow-y: auto;
    }
    .graph-main {
      flex: 1;
      min-width: 0;
    }
    .func-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
    }
    .func-row.active { border-color: var(--accent); }
    .func-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .func-row input[type="text"] {
      flex: 1;
      padding: 0.4rem;
      font-family: var(--mono);
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card-bg);
      color: var(--text);
    }
    .func-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid var(--border);
    }
    .graph-canvas-wrap {
      background: var(--card-bg);
      border: 3px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      position: relative;
    }
    #graphCanvas {
      width: 100%;
      height: 450px;
      display: block;
      cursor: crosshair;
    }
    .graph-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .graph-controls button {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }
    .graph-controls button:hover { background: var(--bg-secondary); }
    .graph-controls button.active { background: var(--border); color: var(--bg); }
    .mode-tabs {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }
    .mode-tabs button {
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }
    .mode-tabs button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .param-inputs {
      display: none;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .param-inputs.show { display: flex; }
    .param-inputs input {
      width: 60px;
      padding: 0.3rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card-bg);
      color: var(--text);
    }
    .trace-info {
      position: absolute;
      background: var(--card-bg);
      border: 2px solid var(--border);
      padding: 0.5rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }
    .table-section {
      margin-top: 1rem;
      border-top: 2px solid var(--border);
      padding-top: 1rem;
    }
    .table-section h4 {
      font-family: var(--mono);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .table-values {
      font-family: var(--mono);
      font-size: 0.75rem;
      overflow-x: auto;
    }
    .table-values table {
      width: 100%;
      border-collapse: collapse;
    }
    .table-values th, .table-values td {
      padding: 0.3rem;
      border: 1px solid var(--border);
      text-align: center;
    }
    .slider-section {
      margin-top: 1rem;
      border-top: 2px solid var(--border);
      padding-top: 1rem;
    }
    .slider-section h4 {
      font-family: var(--mono);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .slider-row label {
      font-family: var(--mono);
      font-size: 0.8rem;
      width: 20px;
    }
    .slider-row input[type="range"] {
      flex: 1;
    }
    .slider-row span {
      font-family: var(--mono);
      font-size: 0.75rem;
      width: 50px;
      text-align: right;
    }
    .axis-range {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .axis-range label {
      font-family: var(--mono);
      font-size: 0.8rem;
    }
    .axis-range input {
      width: 60px;
      padding: 0.3rem;
      font-family: var(--mono);
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card-bg);
      color: var(--text);
    }
    @media (max-width: 900px) {
      .graph-full { flex-direction: column; }
      .graph-sidebar { width: 100%; max-height: none; }
      #graphCanvas { height: 350px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">CalcLab</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="basic.html">Basic</a>
      <a href="scientific.html">Scientific</a>
      <a href="graph.html" class="active">Graph</a>
      <button class="theme-btn" onclick="toggleTheme()">◐ Theme</button>
    </nav>
  </header>

  <main>
    <div class="graph-full">
      <div class="graph-sidebar">
        <div class="mode-tabs">
          <button class="active" onclick="setMode('func')">Y=</button>
          <button onclick="setMode('param')">Param</button>
          <button onclick="setMode('polar')">Polar</button>
          <button onclick="setMode('ineq')">Inequality</button>
        </div>
        <div class="axis-range">
          <div><label>X:</label> <input type="number" id="xMin" value="-10" onchange="updateAxisFromInput(); drawGraph(); saveState();"> to <input type="number" id="xMax" value="10" onchange="updateAxisFromInput(); drawGraph(); saveState();"></div>
          <div><label>Y:</label> <input type="number" id="yMin" value="-10" onchange="updateAxisFromInput(); drawGraph(); saveState();"> to <input type="number" id="yMax" value="10" onchange="updateAxisFromInput(); drawGraph(); saveState();"></div>
        </div>
        <div id="funcInputs"></div>
        <div id="paramInputs" class="param-inputs"></div>
        <div class="table-section">
          <h4>Table of Values</h4>
          <div class="table-values" id="tableValues"></div>
        </div>
        <div class="slider-section">
          <h4>Variables</h4>
          <div id="sliders"></div>
        </div>
      </div>
      <div class="graph-main">
        <div class="graph-controls">
          <button onclick="zoomIn()">Zoom +</button>
          <button onclick="zoomOut()">Zoom -</button>
          <button onclick="zoomFit()">Fit</button>
          <button onclick="setZoom('trig')">Trig</button>
          <button onclick="setZoom('dec')">Dec</button>
          <button onclick="toggleTrace()" id="traceBtn">Trace</button>
          <button onclick="findRoots()">Roots</button>
          <button onclick="generateTable()">Table</button>
          <button onclick="downloadPNG()">PNG</button>
          <button onclick="downloadSVG()">SVG</button>
        </div>
        <div class="graph-canvas-wrap">
          <canvas id="graphCanvas"></canvas>
          <div class="trace-info" id="traceInfo"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>CalcLab — Built with precision</p>
  </footer>

  <script>
    const colors = ['#e63946', '#2a9d8f', '#457b9d', '#f4a261', '#9b5de5', '#00b4d8'];
    let mode = 'func';
    let functions = [
      { expr: 'X+2', active: true },
      { expr: 'X^2', active: true },
      { expr: 'sin(X)', active: false },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false }
    ];
    let paramFuncs = [
      { x: '3*cos(T)', y: '2*sin(T)', active: true },
      { x: 'T', y: 'T^2', active: false }
    ];
    let polarFuncs = [
      { expr: '2*cos(θ)', active: true },
      { expr: '1+cos(θ)', active: false }
    ];
    let ineqFuncs = [
      { expr: 'X', op: '>', active: true },
      { expr: '', op: '>=', active: false },
      { expr: '', op: '<', active: false },
      { expr: '', op: '<=', active: false }
    ];
    let variables = { a: 1, b: 1, c: 1, d: 0 };
    let isTracing = false;
    let traceX = 0;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let xMin = -10, xMax = 10, yMin = -10, yMax = 10;

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      drawGraph();
    }
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-tabs button').forEach((b, i) => {
        b.classList.toggle('active', ['func', 'param', 'polar', 'ineq'].indexOf(m) === i);
      });
      document.getElementById('funcInputs').style.display = m === 'func' || m === 'ineq' ? 'block' : 'none';
      document.getElementById('paramInputs').classList.toggle('show', m !== 'func' && m !== 'ineq');
      generateFuncInputs();
      drawGraph();
    }

    function generateFuncInputs() {
      const container = document.getElementById('funcInputs');
      if (mode === 'func') {
        container.innerHTML = functions.map((f, i) => `
          <div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleFunc(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span style="font-family:var(--mono);font-size:0.8rem;">Y${i+1}=</span>
            <input type="text" value="${f.expr}" placeholder="X" oninput="updateFunc(${i}, this.value)" onkeypress="if(event.key==='Enter')drawGraph()">
          </div>
        `).join('');
      } else if (mode === 'param') {
        container.innerHTML = '';
        document.getElementById('paramInputs').innerHTML = paramFuncs.map((f, i) => `
          <div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleParam(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span style="font-family:var(--mono);font-size:0.8rem;">X${i+1}=</span>
            <input type="text" value="${f.x}" placeholder="T" style="width:80px" oninput="updateParamX(${i}, this.value)">
            <span style="font-family:var(--mono);font-size:0.8rem;">Y${i+1}=</span>
            <input type="text" value="${f.y}" placeholder="T" style="width:80px" oninput="updateParamY(${i}, this.value)">
          </div>
        `).join('');
      } else if (mode === 'polar') {
        container.innerHTML = '';
        document.getElementById('paramInputs').innerHTML = polarFuncs.map((f, i) => `
          <div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="togglePolar(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span style="font-family:var(--mono);font-size:0.8rem;">r${i+1}=</span>
            <input type="text" value="${f.expr}" placeholder="θ" oninput="updatePolar(${i}, this.value)">
          </div>
        `).join('');
      } else if (mode === 'ineq') {
        container.innerHTML = ineqFuncs.map((f, i) => `
          <div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleIneq(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span style="font-family:var(--mono);font-size:0.8rem;">Y${i+1}</span>
            <select onchange="updateIneqOp(${i}, this.value)" style="padding:0.3rem;font-family:var(--mono);font-size:0.8rem;">
              <option value=">" ${f.op === '>' ? 'selected' : ''}>></option>
              <option value=">=" ${f.op === '>=' ? 'selected' : ''}>>=</option>
              <option value="<" ${f.op === '<' ? 'selected' : ''}><</option>
              <option value="<=" ${f.op === '<=' ? 'selected' : ''}><=</option>
            </select>
            <input type="text" value="${f.expr}" placeholder="X" oninput="updateIneq(${i}, this.value)" onkeypress="if(event.key==='Enter')drawGraph()">
          </div>
        `).join('');
      }
    }

    function toggleIneq(i) { ineqFuncs[i].active = !ineqFuncs[i].active; generateFuncInputs(); drawGraph(); saveState(); }
    function updateIneq(i, v) { ineqFuncs[i].expr = v; saveState(); }
    function updateIneqOp(i, op) { ineqFuncs[i].op = op; generateFuncInputs(); drawGraph(); saveState(); }

    function toggleFunc(i) { functions[i].active = !functions[i].active; generateFuncInputs(); drawGraph(); saveState(); }
    function updateFunc(i, v) { functions[i].expr = v; saveState(); }
    function toggleParam(i) { paramFuncs[i].active = !paramFuncs[i].active; generateFuncInputs(); drawGraph(); saveState(); }
    function updateParamX(i, v) { paramFuncs[i].x = v; saveState(); }
    function updateParamY(i, v) { paramFuncs[i].y = v; saveState(); }
    function togglePolar(i) { polarFuncs[i].active = !polarFuncs[i].active; generateFuncInputs(); drawGraph(); saveState(); }
    function updatePolar(i, v) { polarFuncs[i].expr = v; saveState(); }

    function parseMath(expr) {
      if (!expr) return null;
      let e = expr.trim();
      if (!e) return null;
      e = e.replace(/^[YFXyfx()=]+\s*=/i, '');
      if (e.startsWith('-')) e = '0' + e;
      e = e.replace(/\^/g, '**');
      e = e.replace(/(\d)([A-Za-z])/g, '$1*$2');
      e = e.replace(/([A-Za-z])(\d)/g, '$1*$2');
      e = e.replace(/(\d)(\()/g, '$1*$2');
      e = e.replace(/([A-Za-z])(\()/g, '$1*$2');
      e = e.replace(/\)(\()/g, ')*$1');
      e = e.replace(/\bpi\b/gi, 'Math.PI');
      e = e.replace(/\be\b(?![x])/gi, 'Math.E');
      e = e.replace(/\bsin\b/g, 'Math.sin');
      e = e.replace(/\bcos\b/g, 'Math.cos');
      e = e.replace(/\btan\b/g, 'Math.tan');
      e = e.replace(/\basin\b/g, 'Math.asin');
      e = e.replace(/\bacos\b/g, 'Math.acos');
      e = e.replace(/\batan\b/g, 'Math.atan');
      e = e.replace(/\bsqrt\b/g, 'Math.sqrt');
      e = e.replace(/\bcbrt\b/g, 'Math.cbrt');
      e = e.replace(/\babs\b/g, 'Math.abs');
      e = e.replace(/\bln\b/g, 'Math.log');
      e = e.replace(/\blog\b/g, 'Math.log10');
      e = e.replace(/\bexp\b/g, 'Math.exp');
      e = e.replace(/\bfloor\b/g, 'Math.floor');
      e = e.replace(/\bint\b/g, 'Math.floor');
      e = e.replace(/\be\*\*([A-Za-zX]+)/g, 'Math.exp($1)');
      e = e.replace(/\be\^([A-Za-zX]+)/g, 'Math.exp($1)');
      // Add variables
      Object.keys(variables).forEach(v => {
        const regex = new RegExp(`\\b${v}\\b(?![A-Za-z])`, 'g');
        e = e.replace(regex, variables[v]);
      });
      return e;
    }

    function drawGraph() {
      const canvas = document.getElementById('graphCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const bg = isDark ? '#1a1a1a' : '#f5f0e8';
      const fg = isDark ? '#f5f0e8' : '#1a1a1a';
      const gridCol = isDark ? '#333' : '#ddd';
      
      canvas.width = canvas.offsetWidth * 2;
      canvas.height = canvas.offsetHeight * 2;
      ctx.scale(2, 2);
      
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      
      const xRange = xMax - xMin;
      const yRange = yMax - yMin;
      const scaleX = w / xRange;
      const scaleY = h / yRange;
      const toPxX = (x) => (x - xMin) * scaleX;
      const toPxY = (y) => h - (y - yMin) * scaleY;
      
      // Grid
      ctx.strokeStyle = gridCol;
      ctx.lineWidth = 0.5;
      const xStep = getGridStep(xRange);
      const yStep = getGridStep(yRange);
      for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) { ctx.beginPath(); ctx.moveTo(toPxX(x), 0); ctx.lineTo(toPxX(x), h); ctx.stroke(); }
      for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) { ctx.beginPath(); ctx.moveTo(0, toPxY(y)); ctx.lineTo(w, toPxY(y)); ctx.stroke(); }
      
      // Axes
      ctx.strokeStyle = fg;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      if (xMin <= 0 && xMax >= 0) { ctx.moveTo(toPxX(0), 0); ctx.lineTo(toPxX(0), h); }
      if (yMin <= 0 && yMax >= 0) { ctx.moveTo(0, toPxY(0)); ctx.lineTo(w, toPxY(0)); }
      ctx.stroke();
      
      // Draw functions
      if (mode === 'func') {
        functions.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const func = new Function('X', `return ${parsed}`);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let px = 0; px < w; px++) {
              const x = xMin + px / scaleX;
              const y = func(x);
              if (isFinite(y) && y >= yMin - yRange && y <= yMax + yRange) {
                const py = toPxY(y);
                if (!started) { ctx.moveTo(px, py); started = true; }
                else ctx.lineTo(px, py);
              } else { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      } else if (mode === 'param') {
        paramFuncs.forEach((f, i) => {
          if (!f.active || !f.x || !f.y) return;
          const pxExpr = parseMath(f.x);
          const pyExpr = parseMath(f.y);
          if (!pxExpr || !pyExpr) return;
          try {
            const xFunc = new Function('T', `return ${pxExpr}`);
            const yFunc = new Function('T', `return ${pyExpr}`);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let t = xMin; t <= xMax; t += (xRange / 300)) {
              const x = xFunc(t);
              const y = yFunc(t);
              if (isFinite(x) && isFinite(y) && x >= xMin - xRange && x <= xMax + xRange && y >= yMin - yRange && y <= yMax + yRange) {
                const px = toPxX(x);
                const py = toPxY(y);
                if (!started) { ctx.moveTo(px, py); started = true; }
                else ctx.lineTo(px, py);
              } else { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      } else if (mode === 'polar') {
        polarFuncs.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const rFunc = new Function('θ', `return ${parsed}`);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let t = 0; t <= 2 * Math.PI; t += (2 * Math.PI / 300)) {
              const r = rFunc(t);
              if (isFinite(r)) {
                const x = r * Math.cos(t);
                const y = r * Math.sin(t);
                if (x >= xMin - xRange && x <= xMax + xRange && y >= yMin - yRange && y <= yMax + yRange) {
                  const px = toPxX(x);
                  const py = toPxY(y);
                  if (!started) { ctx.moveTo(px, py); started = true; }
                  else ctx.lineTo(px, py);
                } else { started = false; }
              } else { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      } else if (mode === 'ineq') {
        ineqFuncs.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const func = new Function('X', `return ${parsed}`);
            ctx.fillStyle = colors[i] + '40';
            ctx.beginPath();
            for (let px = 0; px < w; px++) {
              const x = xMin + px / scaleX;
              const y = func(x);
              if (!isFinite(y)) continue;
              let satisfies = false;
              switch (f.op) {
                case '>': satisfies = y > xMin; break;
                case '>=': satisfies = y >= xMin; break;
                case '<': satisfies = y < xMax; break;
                case '<=': satisfies = y <= xMax; break;
              }
              if (satisfies) {
                const op = f.op === '>' || f.op === '>=' ? '>=' : '<=';
                let meets = false;
                if (op === '>=') meets = y >= func(xMin + (px > 0 ? (xMin + (px-1)/scaleX) : xMin + 1/scaleX));
                else meets = y <= func(xMin + (px > 0 ? (xMin + (px-1)/scaleX) : xMin + 1/scaleX));
                if (px === 0) ctx.moveTo(px, toPxY(y));
                else ctx.lineTo(px, toPxY(y));
              }
            }
            ctx.lineTo(w, toPxY(f.op === '>' || f.op === '>=' ? yMax : yMin));
            ctx.lineTo(0, toPxY(f.op === '>' || f.op === '>=' ? yMax : yMin));
            ctx.closePath();
            ctx.fill();
          } catch (e) {}
        });
      }
      
      // Update trace info
      updateTraceInfo();
    }

    function getGridStep(range) {
      const raw = range / 10;
      const mag = Math.floor(Math.log10(raw));
      const pow = Math.pow(10, mag);
      return Math.ceil(raw / pow) * pow;
    }

    function zoomIn() {
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const dx = (xMax - xMin) * 0.4;
      const dy = (yMax - yMin) * 0.4;
      xMin = cx - dx; xMax = cx + dx;
      yMin = cy - dy; yMax = cy + dy;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function zoomOut() {
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const dx = (xMax - xMin) * 0.6;
      const dy = (yMax - yMin) * 0.6;
      xMin = cx - dx; xMax = cx + dx;
      yMin = cy - dy; yMax = cy + dy;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function zoomFit() {
      xMin = -10; xMax = 10; yMin = -10; yMax = 10;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

function setZoom(type) {
      if (type === 'trig') {
        xMin = -2 * Math.PI; xMax = 2 * Math.PI;
        yMin = -3; yMax = 3;
      } else {
        xMin = -10; xMax = 10; yMin = -10; yMax = 10;
      }
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function updateAxisFromInput() {
      xMin = parseFloat(document.getElementById('xMin').value) || -10;
      xMax = parseFloat(document.getElementById('xMax').value) || 10;
      yMin = parseFloat(document.getElementById('yMin').value) || -10;
      yMax = parseFloat(document.getElementById('yMax').value) || 10;
    }

    function updateAxisInputs() {
      document.getElementById('xMin').value = Math.round(xMin);
      document.getElementById('xMax').value = Math.round(xMax);
      document.getElementById('yMin').value = Math.round(yMin);
      document.getElementById('yMax').value = Math.round(yMax);
    }
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    

    function toggleTrace() {
      isTracing = !isTracing;
      document.getElementById('traceBtn').classList.toggle('active', isTracing);
      document.getElementById('traceInfo').style.display = isTracing ? 'block' : 'none';
      drawGraph();
    }

    function updateTraceInfo() {
      const info = document.getElementById('traceInfo');
      if (!isTracing || mode !== 'func' || !functions[0].active) {
        info.style.display = 'none';
        return;
      }
      try {
        const parsed = parseMath(functions[0].expr);
        if (!parsed) return;
        const func = new Function('X', `return ${parsed}`);
        const y = func(traceX);
        if (isFinite(y)) {
          info.textContent = `X=${traceX.toFixed(3)} Y=${y.toFixed(3)}`;
          info.style.left = '120px';
          info.style.top = '50px';
        }
      } catch (e) {}
    }

    function findRoots() {
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let roots = [];
      for (let x = xMin; x <= xMax; x += 0.1) {
        const y1 = func(x);
        const y2 = func(x + 0.1);
        if (y1 * y2 < 0) {
          // Bisection
          let a = x, b = x + 0.1;
          for (let i = 0; i < 20; i++) {
            const c = (a + b) / 2;
            if (func(a) * func(c) <= 0) b = c;
            else a = c;
          }
          roots.push((a + b) / 2);
        }
      }
      alert(roots.length ? `Roots found: ${roots.map(r => r.toFixed(3)).join(', ')}` : 'No roots found in visible range');
    }

    function generateTable() {
      const table = document.getElementById('tableValues');
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) {
        table.innerHTML = '<p style="color:var(--text-muted)">No function to table</p>';
        return;
      }
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      try {
        const func = new Function('X', `return ${parsed}`);
        let html = '<table><tr><th>X</th><th>Y</th></tr>';
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          const y = func(x);
          if (isFinite(y)) {
            html += `<tr><td>${x}</td><td>${y.toFixed(3)}</td></tr>`;
          }
        }
        html += '</table>';
        table.innerHTML = html;
      } catch (e) {
        table.innerHTML = '<p style="color:var(--text-muted)">Error</p>';
      }
    }

    // Sliders
    function generateSliders() {
      const container = document.getElementById('sliders');
      container.innerHTML = Object.keys(variables).map(v => `
        <div class="slider-row">
          <label>${v}</label>
          <input type="range" min="-5" max="5" step="0.1" value="${variables[v]}" oninput="updateVariable('${v}', this.value)">
          <span>${variables[v]}</span>
        </div>
      `).join('');
    }

    function updateVariable(v, val) {
      variables[v] = parseFloat(val);
      document.querySelectorAll('#sliders .slider-row').forEach((row, i) => {
        row.querySelector('span').textContent = variables[Object.keys(variables)[i]];
      });
      drawGraph();
      saveState();
    }

    function downloadPNG() {
      const canvas = document.getElementById('graphCanvas');
      const link = document.createElement('a');
      link.download = 'graph.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadSVG() {
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      const xRange = xMax - xMin;
      const yRange = yMax - yMin;
      const scaleX = w / xRange;
      const scaleY = h / yRange;
      const toPxX = (x) => (x - xMin) * scaleX;
      const toPxY = (y) => h - (y - yMin) * scaleY;
      
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
      svg += `<rect width="${w}" height="${h}" fill="${document.documentElement.getAttribute('data-theme') === 'dark' ? '#1a1a1a' : '#f5f0e8'}"/>`;
      
      const gridCol = document.documentElement.getAttribute('data-theme') === 'dark' ? '#333' : '#ddd';
      const xStep = getGridStep(xRange);
      const yStep = getGridStep(yRange);
      
      for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
        svg += `<line x1="${toPxX(x)}" y1="0" x2="${toPxX(x)}" y2="${h}" stroke="${gridCol}" stroke-width="0.5"/>`;
      }
      for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
        svg += `<line x1="0" y1="${toPxY(y)}" x2="${w}" y2="${toPxY(y)}" stroke="${gridCol}" stroke-width="0.5"/>`;
      }
      
      const fg = document.documentElement.getAttribute('data-theme') === 'dark' ? '#f5f0e8' : '#1a1a1a';
      if (xMin <= 0 && xMax >= 0) svg += `<line x1="${toPxX(0)}" y1="0" x2="${toPxX(0)}" y2="${h}" stroke="${fg}" stroke-width="1.5"/>`;
      if (yMin <= 0 && yMax >= 0) svg += `<line x1="0" y1="${toPxY(0)}" x2="${w}" y2="${toPxY(0)}" stroke="${fg}" stroke-width="1.5"/>`;
      
      if (mode === 'func') {
        functions.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          let pathD = '';
          let started = false;
          for (let px = 0; px < w; px++) {
            const x = xMin + px / scaleX;
            try {
              const func = new Function('X', 'return ' + parseMath(f.expr));
              const y = func(x);
              if (isFinite(y) && y >= yMin - yRange && y <= yMax + yRange) {
                const py = toPxY(y);
                if (!started) { pathD += `M ${px} ${py}`; started = true; }
                else pathD += ` L ${px} ${py}`;
              } else { started = false; }
            } catch (e) {}
          }
          if (pathD) svg += `<path d="${pathD}" fill="none" stroke="${colors[i]}" stroke-width="2"/>`;
        });
      }
      
      svg += '</svg>';
      
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = 'graph.svg';
      link.href = URL.createObjectURL(blob);
      link.click();
    }

    // Canvas events
    document.getElementById('graphCanvas').addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging && e.shiftKey) {
        const dx = (dragStart.x - e.clientX) * (xMax - xMin) / 400;
        const dy = (e.clientY - dragStart.y) * (yMax - yMin) / 400;
        xMin += dx; xMax += dx;
        yMin += dy; yMax += dy;
        updateAxisInputs();
        drawGraph();
        dragStart = { x: e.clientX, y: e.clientY };
        saveState();
      }
      if (isTracing) {
        const rect = document.getElementById('graphCanvas').getBoundingClientRect();
        traceX = xMin + ((e.clientX - rect.left) / rect.width) * (xMax - xMin);
        drawGraph();
      }
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    document.getElementById('graphCanvas').addEventListener('wheel', (e) => {
      e.preventDefault();
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const factor = e.deltaY > 0 ? 1.2 : 0.8;
      xMin = cx - (cx - xMin) * factor;
      xMax = cx + (xMax - cx) * factor;
      yMin = cy - (cy - yMin) * factor;
      yMax = cy + (yMax - cy) * factor;
      updateAxisInputs();
      drawGraph();
      saveState();
    }, { passive: false });

    generateFuncInputs();
    generateSliders();
    loadState();
    drawGraph();

    window.addEventListener('resize', drawGraph);

    function saveState() {
      localStorage.setItem('graphState', JSON.stringify({
        mode, functions, paramFuncs, polarFuncs, variables,
        xMin, xMax, yMin, yMax
      }));
    }

    function loadState() {
      try {
        const state = JSON.parse(localStorage.getItem('graphState'));
        if (state) {
          mode = state.mode || 'func';
          functions = state.functions || functions;
          paramFuncs = state.paramFuncs || paramFuncs;
          polarFuncs = state.polarFuncs || polarFuncs;
          variables = state.variables || variables;
          xMin = state.xMin ?? -10;
          xMax = state.xMax ?? 10;
          yMin = state.yMin ?? -10;
          yMax = state.yMax ?? 10;
          setMode(mode);
          updateAxisInputs();
        }
      } catch (e) {}
    }
  </script>
</body>
</html>
