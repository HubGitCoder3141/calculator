<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Calculator - CalcLab</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#B85C38">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">CalcLab</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="basic.html">Basic</a>
      <a href="scientific.html">Scientific</a>
      <a href="graph.html" class="active">Graph</a>
      <button class="theme-btn" onclick="toggleTheme()">◐</button>
      <a href="settings.html" class="theme-btn">⚙</a>
    </nav>
  </header>

  <main>
    <div class="graph-full">
      <div class="graph-sidebar">
        <div class="mode-tabs">
          <button class="active" id="tabFunc" onclick="setMode('func')">Y=</button>
          <button id="tabParam" onclick="setMode('param')">Param</button>
          <button id="tabPolar" onclick="setMode('polar')">Polar</button>
          <button id="tabIneq" onclick="setMode('ineq')">Inequality</button>
        </div>
        
        <div class="axis-range">
          <div>
            <label>X:</label>
            <input type="number" id="xMin" value="-10" onchange="updateAxis();">
            <span>to</span>
            <input type="number" id="xMax" value="10" onchange="updateAxis();">
          </div>
          <div>
            <label>Y:</label>
            <input type="number" id="yMin" value="-10" onchange="updateAxis();">
            <span>to</span>
            <input type="number" id="yMax" value="10" onchange="updateAxis();">
          </div>
        </div>

        <div class="func-list" id="funcList">
          <!-- Function inputs will be generated here -->
        </div>

        <div class="table-section">
          <h4>Table of Values</h4>
          <div id="tableValues"></div>
        </div>

        <div class="slider-section">
          <h4>Variables</h4>
          <div id="sliders"></div>
        </div>
      </div>

      <div class="graph-main">
        <div class="graph-controls">
          <button onclick="undo()">↶ Undo</button>
          <button onclick="redo()">↷ Redo</button>
          <button onclick="zoomIn()">Zoom +</button>
          <button onclick="zoomOut()">Zoom -</button>
          <button onclick="zoomFit()">Fit</button>
          <button onclick="setZoom('trig')">Trig</button>
          <button onclick="setZoom('dec')">Dec</button>
          <button onclick="toggleGrid()" id="gridBtn">Grid</button>
          <button onclick="toggleTrace()" id="traceBtn">Trace</button>
          <button onclick="findRoots()">Roots</button>
          <button onclick="findExtrema()">Extrema</button>
          <button onclick="findIntersection()">∩</button>
          <button onclick="showIntegral()">∫</button>
          <button onclick="showTangent()">Tan</button>
          <button onclick="generateTable()">Table</button>
          <button onclick="shareURL()">Share</button>
          <button onclick="downloadPNG()">PNG</button>
          <button onclick="downloadSVG()">SVG</button>
        </div>
        <div class="graph-canvas-wrap">
          <canvas id="graphCanvas"></canvas>
          <div class="trace-info" id="traceInfo"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>CalcLab — Built with precision</p>
  </footer>

  <style>
    .func-list { margin: 1rem 0; }
    .func-row {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.4rem;
      padding: 0.3rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }
    .func-row.active { border-color: var(--accent); }
    .func-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .func-color { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
    .func-label { font-family: var(--mono); font-size: 0.75rem; min-width: 28px; }
    .func-row input[type="text"] {
      flex: 1;
      min-width: 80px;
      padding: 0.3rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: #000;
    }
    .axis-range { margin: 0.8rem 0; }
    .axis-range div { display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.3rem; }
    .axis-range label { font-family: var(--mono); font-size: 0.75rem; }
    .axis-range input {
      width: 55px;
      padding: 0.3rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
    }
    .axis-range span { font-family: var(--mono); font-size: 0.7rem; color: var(--text-muted); }
    .param-inputs { margin-top: 0.5rem; }
    .param-row { display: flex; gap: 0.3rem; margin-bottom: 0.4rem; align-items: center; }
    .param-row input[type="text"] { width: 70px; }
  </style>

  <script>
    const colors = ['#e63946', '#2a9d8f', '#457b9d', '#f4a261', '#9b5de5', '#00b4d8'];
    let mode = 'func';
    let functions = [
      { expr: 'X^2', active: true },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false }
    ];
    let paramFuncs = [
      { x: '3*cos(T)', y: '2*sin(T)', active: true },
      { x: '', y: '', active: false }
    ];
    let polarFuncs = [
      { expr: '2*cos(θ)', active: true },
      { expr: '', active: false }
    ];
    let ineqFuncs = [
      { expr: 'X', op: '>', active: true },
      { expr: '', op: '<', active: false }
    ];
    let variables = { a: 1, b: 1, c: 1, d: 0 };
    let isTracing = false;
    let showGrid = true;
    let undoStack = [];
    let redoStack = [];
    let traceX = 0;
    let xMin = -10, xMax = 10, yMin = -10, yMax = 10;

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      drawGraph();
    }
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    function setMode(m) {
      pushUndo();
      mode = m;
      document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
      generateFuncInputs();
      drawGraph();
    }

    function generateFuncInputs() {
      const container = document.getElementById('funcList');
      let html = '';
      
      if (mode === 'func') {
        functions.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleFunc(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">Y${i+1}=</span>
            <input type="text" value="${f.expr}" placeholder="X" oninput="updateFunc(${i}, this.value)" onkeydown="if(event.key==='Enter')drawGraph()">
          </div>`;
        });
      } else if (mode === 'param') {
        paramFuncs.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleParam(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">X${i+1}=</span>
            <input type="text" value="${f.x}" placeholder="T" oninput="updateParamX(${i}, this.value)">
            <span class="func-label">Y${i+1}=</span>
            <input type="text" value="${f.y}" placeholder="T" oninput="updateParamY(${i}, this.value)">
          </div>`;
        });
      } else if (mode === 'polar') {
        polarFuncs.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="togglePolar(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">r${i+1}=</span>
            <input type="text" value="${f.expr}" placeholder="θ" oninput="updatePolar(${i}, this.value)">
          </div>`;
        });
      } else if (mode === 'ineq') {
        ineqFuncs.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleIneq(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">Y${i+1}</span>
            <select onchange="updateIneqOp(${i}, this.value)">
              <option value=">" ${f.op === '>' ? 'selected' : ''}>></option>
              <option value=">=" ${f.op === '>=' ? 'selected' : ''}>>=</option>
              <option value="<" ${f.op === '<' ? 'selected' : ''}><</option>
              <option value="<=" ${f.op === '<=' ? 'selected' : ''}><=</option>
            </select>
            <input type="text" value="${f.expr}" placeholder="X" oninput="updateIneq(${i}, this.value)">
          </div>`;
        });
      }
      
      container.innerHTML = html;
    }

    function toggleFunc(i) { functions[i].active = !functions[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updateFunc(i, v) { functions[i].expr = v; saveState(); debounceDraw(); }
    function toggleParam(i) { paramFuncs[i].active = !paramFuncs[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updateParamX(i, v) { paramFuncs[i].x = v; saveState(); debounceDraw(); }
    function updateParamY(i, v) { paramFuncs[i].y = v; saveState(); debounceDraw(); }
    function togglePolar(i) { polarFuncs[i].active = !polarFuncs[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updatePolar(i, v) { polarFuncs[i].expr = v; saveState(); debounceDraw(); }
    function toggleIneq(i) { ineqFuncs[i].active = !ineqFuncs[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updateIneq(i, v) { ineqFuncs[i].expr = v; saveState(); debounceDraw(); }
    function updateIneqOp(i, op) { ineqFuncs[i].op = op; pushUndo(); generateFuncInputs(); drawGraph(); }

    let drawTimeout;
    function debounceDraw() {
      clearTimeout(drawTimeout);
      drawTimeout = setTimeout(drawGraph, 150);
    }

    function parseMath(expr) {
      if (!expr || !expr.trim()) return null;
      let e = expr.trim();
      e = e.replace(/\^/g, '**');
      e = e.replace(/(\d)([A-Za-z(])/g, '$1*$2');
      e = e.replace(/([A-Za-z])(\d)/g, '$1*$2');
      e = e.replace(/\)(\d)/g, ')*$1');
      e = e.replace(/\bpi\b/gi, 'Math.PI');
      e = e.replace(/\be\b(?![x])/gi, 'Math.E');
      e = e.replace(/\bsin\b/g, 'Math.sin');
      e = e.replace(/\bcos\b/g, 'Math.cos');
      e = e.replace(/\btan\b/g, 'Math.tan');
      e = e.replace(/\basin\b/g, 'Math.asin');
      e = e.replace(/\bacos\b/g, 'Math.acos');
      e = e.replace(/\batan\b/g, 'Math.atan');
      e = e.replace(/\bsinh\b/g, 'Math.sinh');
      e = e.replace(/\bcosh\b/g, 'Math.cosh');
      e = e.replace(/\btanh\b/g, 'Math.tanh');
      e = e.replace(/\bsqrt\b/g, 'Math.sqrt');
      e = e.replace(/\bcbrt\b/g, 'Math.cbrt');
      e = e.replace(/\babs\b/g, 'Math.abs');
      e = e.replace(/\bln\b/g, 'Math.log');
      e = e.replace(/\blog\b/g, 'Math.log10');
      e = e.replace(/\bexp\b/g, 'Math.exp');
      e = e.replace(/\bfloor\b/g, 'Math.floor');
      e = e.replace(/\bceil\b/g, 'Math.ceil');
      e = e.replace(/\bround\b/g, 'Math.round');
      Object.keys(variables).forEach(v => {
        e = e.replace(new RegExp(`\\b${v}\\b`, 'g'), variables[v]);
      });
      return e;
    }

    function drawGraph() {
      const canvas = document.getElementById('graphCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const bg = isDark ? '#1a1a1a' : '#f5f0e8';
      const fg = isDark ? '#f5f0e8' : '#1a1a1a';
      
      canvas.width = canvas.offsetWidth * 2;
      canvas.height = canvas.offsetHeight * 2;
      ctx.scale(2, 2);
      
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      
      const xRange = xMax - xMin;
      const yRange = yMax - yMin;
      const aspect = w / h;
      const xAspect = xRange / yRange;
      let scaleX, scaleY;
      if (xAspect > aspect) {
        scaleX = w / xRange;
        scaleY = scaleX;
      } else {
        scaleY = h / yRange;
        scaleX = scaleY;
      }
      const toPxX = (x) => (x - xMin) * scaleX;
      const toPxY = (y) => h - (y - yMin) * scaleY;
      
      const gridCol = showGrid ? (isDark ? '#333' : '#ddd') : 'transparent';
      
      // Grid
      ctx.strokeStyle = gridCol;
      ctx.lineWidth = 0.5;
      const xStep = getGridStep(xRange);
      const yStep = getGridStep(yRange);
      if (showGrid) {
        for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
          ctx.beginPath();
          ctx.moveTo(toPxX(x), 0);
          ctx.lineTo(toPxX(x), h);
          ctx.stroke();
        }
        for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
          ctx.beginPath();
          ctx.moveTo(0, toPxY(y));
          ctx.lineTo(w, toPxY(y));
          ctx.stroke();
        }
      }
      
      // Axes
      ctx.strokeStyle = fg;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      if (xMin <= 0 && xMax >= 0) { ctx.moveTo(toPxX(0), 0); ctx.lineTo(toPxX(0), h); }
      if (yMin <= 0 && yMax >= 0) { ctx.moveTo(0, toPxY(0)); ctx.lineTo(w, toPxY(0)); }
      ctx.stroke();
      
      // Labels
      ctx.fillStyle = fg;
      ctx.font = '10px JetBrains Mono';
      if (xMin <= 0 && xMax >= 0) {
        for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
          if (x !== 0) {
            ctx.fillText(x.toFixed(1), toPxX(x) + 2, toPxY(0) + 12);
          }
        }
      }
      if (yMin <= 0 && yMax >= 0) {
        for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
          if (y !== 0) {
            ctx.fillText(y.toFixed(1), toPxX(0) + 4, toPxY(y) - 4);
          }
        }
      }
      
      // Draw functions
      if (mode === 'func') {
        const funcScaleX = w / xRange;
        functions.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const func = new Function('X', `return ${parsed}`);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let px = 0; px < w; px++) {
              const x = xMin + px / funcScaleX;
              const y = func(x);
              if (isFinite(y) && y >= yMin - yRange && y <= yMax + yRange) {
                const py = toPxY(y);
                if (!started) { ctx.moveTo(px, py); started = true; }
                else ctx.lineTo(px, py);
              } else { started = false; }
            }
            ctx.stroke();
          } catch (e) { console.log('Error:', e); }
        });
      } else if (mode === 'param') {
        paramFuncs.forEach((f, i) => {
          if (!f.active || !f.x || !f.y) return;
          const pxExpr = parseMath(f.x);
          const pyExpr = parseMath(f.y);
          if (!pxExpr || !pyExpr) return;
          try {
            const xFunc = new Function('T', `return ${pxExpr}`);
            const yFunc = new Function('T', `return ${pyExpr}`);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let t = xMin; t <= xMax; t += (xRange / 300)) {
              const x = xFunc(t);
              const y = yFunc(t);
              if (isFinite(x) && isFinite(y) && x >= xMin - xRange && x <= xMax + xRange && y >= yMin - yRange && y <= yMax + yRange) {
                const px = toPxX(x);
                const py = toPxY(y);
                if (!started) { ctx.moveTo(px, py); started = true; }
                else ctx.lineTo(px, py);
              } else { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      } else if (mode === 'polar') {
        polarFuncs.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const rFunc = new Function('θ', `return ${parsed}`);
            ctx.strokeStyle = colors[i];
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let t = 0; t <= 2 * Math.PI; t += (2 * Math.PI / 300)) {
              const r = rFunc(t);
              if (isFinite(r)) {
                const x = r * Math.cos(t);
                const y = r * Math.sin(t);
                if (x >= xMin - xRange && x <= xMax + xRange && y >= yMin - yRange && y <= yMax + yRange) {
                  const px = toPxX(x);
                  const py = toPxY(y);
                  if (!started) { ctx.moveTo(px, py); started = true; }
                  else ctx.lineTo(px, py);
                } else { started = false; }
              } else { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      }
      
      updateTraceInfo();
    }

    function getGridStep(range) {
      const raw = range / 10;
      const mag = Math.floor(Math.log10(raw));
      const pow = Math.pow(10, mag);
      return Math.ceil(raw / pow) * pow;
    }

    function updateAxis() {
      xMin = parseFloat(document.getElementById('xMin').value) || -10;
      xMax = parseFloat(document.getElementById('xMax').value) || 10;
      yMin = parseFloat(document.getElementById('yMin').value) || -10;
      yMax = parseFloat(document.getElementById('yMax').value) || 10;
      saveState();
      drawGraph();
    }

    function zoomIn() {
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const dx = (xMax - xMin) * 0.4;
      const dy = (yMax - yMin) * 0.4;
      xMin = cx - dx; xMax = cx + dx;
      yMin = cy - dy; yMax = cy + dy;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function zoomOut() {
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const dx = (xMax - xMin) * 0.6;
      const dy = (yMax - yMin) * 0.6;
      xMin = cx - dx; xMax = cx + dx;
      yMin = cy - dy; yMax = cy + dy;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function zoomFit() {
      xMin = -10; xMax = 10; yMin = -10; yMax = 10;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function setZoom(type) {
      if (type === 'trig') {
        xMin = -2 * Math.PI; xMax = 2 * Math.PI;
        yMin = -3; yMax = 3;
      } else {
        xMin = -10; xMax = 10; yMin = -10; yMax = 10;
      }
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function updateAxisInputs() {
      document.getElementById('xMin').value = xMin;
      document.getElementById('xMax').value = xMax;
      document.getElementById('yMin').value = yMin;
      document.getElementById('yMax').value = yMax;
    }

    function toggleTrace() {
      isTracing = !isTracing;
      document.getElementById('traceBtn').classList.toggle('active', isTracing);
      document.getElementById('traceInfo').style.display = isTracing ? 'block' : 'none';
      drawGraph();
    }

    function toggleGrid() {
      showGrid = !showGrid;
      document.getElementById('gridBtn').classList.toggle('active', showGrid);
      drawGraph();
    }

    function updateTraceInfo() {
      const info = document.getElementById('traceInfo');
      if (!isTracing || mode !== 'func' || !functions[0].active || !functions[0].expr) {
        info.style.display = 'none';
        return;
      }
      try {
        const parsed = parseMath(functions[0].expr);
        if (!parsed) return;
        const func = new Function('X', `return ${parsed}`);
        const y = func(traceX);
        if (isFinite(y)) {
          info.textContent = `X=${traceX.toFixed(3)} Y=${y.toFixed(3)}`;
          info.style.left = '10px';
          info.style.top = '10px';
        }
      } catch (e) {}
    }

    function findRoots() {
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let roots = [];
      for (let x = xMin; x <= xMax; x += 0.1) {
        const y1 = func(x);
        const y2 = func(x + 0.1);
        if (y1 * y2 < 0) {
          let a = x, b = x + 0.1;
          for (let i = 0; i < 20; i++) {
            const c = (a + b) / 2;
            if (func(a) * func(c) <= 0) b = c;
            else a = c;
          }
          roots.push((a + b) / 2);
        }
      }
      alert(roots.length ? `Roots: ${roots.map(r => r.toFixed(3)).join(', ')}` : 'No roots found');
    }

    function findExtrema() {
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let extrema = [];
      for (let x = xMin + 0.2; x <= xMax - 0.2; x += 0.1) {
        const y1 = func(x - 0.1);
        const y2 = func(x);
        const y3 = func(x + 0.1);
        if (y2 > y1 && y2 > y3) extrema.push({ x, y: y2, type: 'max' });
        if (y2 < y1 && y2 < y3) extrema.push({ x, y: y2, type: 'min' });
      }
      if (extrema.length) {
        alert(`Extrema:\n${extrema.map(e => `${e.type.toUpperCase()}: X=${e.x.toFixed(3)}, Y=${e.y.toFixed(3)}`).join('\n')}`);
      } else {
        alert('No extrema found');
      }
    }

    function findIntersection() {
      if (mode !== 'func' || !functions[0].active || !functions[1].active) return;
      const parsed1 = parseMath(functions[0].expr);
      const parsed2 = parseMath(functions[1].expr);
      if (!parsed1 || !parsed2) return;
      const func1 = new Function('X', `return ${parsed1}`);
      const func2 = new Function('X', `return ${parsed2}`);
      let intersections = [];
      for (let x = xMin; x <= xMax; x += 0.1) {
        const y1 = func1(x) - func2(x);
        const y2 = func1(x + 0.1) - func2(x + 0.1);
        if (y1 * y2 < 0) {
          let a = x, b = x + 0.1;
          for (let i = 0; i < 20; i++) {
            const c = (a + b) / 2;
            if ((func1(a) - func2(a)) * (func1(c) - func2(c)) <= 0) b = c;
            else a = c;
          }
          intersections.push((a + b) / 2);
        }
      }
      alert(intersections.length ? `Intersections: ${intersections.map(r => r.toFixed(3)).join(', ')}` : 'No intersections found');
    }

    function showIntegral() {
      const a = prompt('Lower bound:', xMin.toFixed(1));
      const b = prompt('Upper bound:', xMax.toFixed(1));
      if (!a || !b) return;
      const lower = parseFloat(a), upper = parseFloat(b);
      if (isNaN(lower) || isNaN(upper)) { alert('Invalid bounds'); return; }
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let sum = 0;
      const n = 1000;
      const step = (upper - lower) / n;
      for (let i = 0; i < n; i++) {
        sum += func(lower + i * step) * step;
      }
      alert(`Integral from ${lower.toFixed(2)} to ${upper.toFixed(2)}:\nArea ≈ ${sum.toFixed(4)}`);
    }

    function showTangent() {
      const x0 = prompt('X value:', '0');
      if (!x0) return;
      const xVal = parseFloat(x0);
      if (isNaN(xVal)) { alert('Invalid X'); return; }
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      const y0 = func(xVal);
      if (!isFinite(y0)) { alert('Undefined'); return; }
      const h = 0.001;
      const slope = (func(xVal + h) - func(xVal - h)) / (2 * h);
      alert(`At X=${xVal.toFixed(3)}:\nY=${y0.toFixed(3)}\nSlope=${slope.toFixed(3)}`);
    }

    function shareURL() {
      const state = { mode, functions, paramFuncs, polarFuncs, xMin, xMax, yMin, yMax };
      const encoded = btoa(JSON.stringify(state));
      const url = window.location.origin + window.location.pathname + '?s=' + encoded;
      navigator.clipboard.writeText(url).then(() => alert('URL copied!'));
    }

    function undo() {
      if (undoStack.length === 0) return;
      const state = undoStack.pop();
      redoStack.push({ mode, functions: JSON.parse(JSON.stringify(functions)), paramFuncs: JSON.parse(JSON.stringify(paramFuncs)), polarFuncs: JSON.parse(JSON.stringify(polarFuncs)), xMin, xMax, yMin, yMax });
      mode = state.mode; functions = state.functions; paramFuncs = state.paramFuncs; polarFuncs = state.polarFuncs;
      xMin = state.xMin; xMax = state.xMax; yMin = state.yMin; yMax = state.yMax;
      generateFuncInputs();
      updateAxisInputs();
      drawGraph();
    }

    function redo() {
      if (redoStack.length === 0) return;
      const state = redoStack.pop();
      undoStack.push({ mode, functions: JSON.parse(JSON.stringify(functions)), paramFuncs: JSON.parse(JSON.stringify(paramFuncs)), polarFuncs: JSON.parse(JSON.stringify(polarFuncs)), xMin, xMax, yMin, yMax });
      mode = state.mode; functions = state.functions; paramFuncs = state.paramFuncs; polarFuncs = state.polarFuncs;
      xMin = state.xMin; xMax = state.xMax; yMin = state.yMin; yMax = state.yMax;
      generateFuncInputs();
      updateAxisInputs();
      drawGraph();
    }

    function pushUndo() {
      undoStack.push({ mode, functions: JSON.parse(JSON.stringify(functions)), paramFuncs: JSON.parse(JSON.stringify(paramFuncs)), polarFuncs: JSON.parse(JSON.stringify(polarFuncs)), xMin, xMax, yMin, yMax });
      redoStack = [];
      if (undoStack.length > 50) undoStack.shift();
    }

    function generateTable() {
      const table = document.getElementById('tableValues');
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) {
        table.innerHTML = '<p style="color:var(--text-muted)">No function</p>';
        return;
      }
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      try {
        const func = new Function('X', `return ${parsed}`);
        let html = '<table><tr><th>X</th><th>Y</th></tr>';
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          const y = func(x);
          if (isFinite(y)) {
            html += `<tr><td>${x}</td><td>${y.toFixed(3)}</td></tr>`;
          }
        }
        html += '</table>';
        table.innerHTML = html;
      } catch (e) {
        table.innerHTML = '<p style="color:var(--text-muted)">Error</p>';
      }
    }

    function generateSliders() {
      const container = document.getElementById('sliders');
      container.innerHTML = Object.keys(variables).map(v => `
        <div class="slider-row">
          <label>${v}</label>
          <input type="range" min="-5" max="5" step="0.1" value="${variables[v]}" oninput="updateVariable('${v}', this.value)">
          <span>${variables[v]}</span>
        </div>
      `).join('');
    }

    function updateVariable(v, val) {
      variables[v] = parseFloat(val);
      document.querySelectorAll('#sliders .slider-row').forEach((row, i) => {
        row.querySelector('span').textContent = variables[Object.keys(variables)[i]];
      });
      drawGraph();
      saveState();
    }

    function downloadPNG() {
      const canvas = document.getElementById('graphCanvas');
      const link = document.createElement('a');
      link.download = 'graph.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadSVG() {
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      const scaleX = w / (xMax - xMin);
      const scaleY = h / (yMax - yMin);
      const toPxX = (x) => (x - xMin) * scaleX;
      const toPxY = (y) => h - (y - yMin) * scaleY;
      
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">`;
      svg += `<rect width="${w}" height="${h}" fill="#f5f0e8"/>`;
      
      if (showGrid) {
        const xStep = getGridStep(xMax - xMin);
        const yStep = getGridStep(yMax - yMin);
        for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
          svg += `<line x1="${toPxX(x)}" y1="0" x2="${toPxX(x)}" y2="${h}" stroke="#ddd" stroke-width="0.5"/>`;
        }
        for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
          svg += `<line x1="0" y1="${toPxY(y)}" x2="${w}" y2="${toPxY(y)}" stroke="#ddd" stroke-width="0.5"/>`;
        }
      }
      
      if (xMin <= 0 && xMax >= 0) svg += `<line x1="${toPxX(0)}" y1="0" x2="${toPxX(0)}" y2="${h}" stroke="#1a1a1a" stroke-width="1.5"/>`;
      if (yMin <= 0 && yMax >= 0) svg += `<line x1="0" y1="${toPxY(0)}" x2="${w}" y2="${toPxY(0)}" stroke="#1a1a1a" stroke-width="1.5"/>`;
      
      svg += '</svg>';
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = 'graph.svg';
      link.href = URL.createObjectURL(blob);
      link.click();
    }

    // Canvas events
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };

    document.getElementById('graphCanvas').addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging && e.shiftKey) {
        const dx = (dragStart.x - e.clientX) * (xMax - xMin) / 400;
        const dy = (e.clientY - dragStart.y) * (yMax - yMin) / 400;
        xMin += dx; xMax += dx;
        yMin += dy; yMax += dy;
        updateAxisInputs();
        drawGraph();
        dragStart = { x: e.clientX, y: e.clientY };
        saveState();
      }
      if (isTracing) {
        const rect = document.getElementById('graphCanvas').getBoundingClientRect();
        traceX = xMin + ((e.clientX - rect.left) / rect.width) * (xMax - xMin);
        drawGraph();
      }
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    document.getElementById('graphCanvas').addEventListener('wheel', (e) => {
      e.preventDefault();
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const factor = e.deltaY > 0 ? 1.2 : 0.8;
      xMin = cx - (cx - xMin) * factor;
      xMax = cx + (xMax - cx) * factor;
      yMin = cy - (cy - yMin) * factor;
      yMax = cy + (yMax - cy) * factor;
      updateAxisInputs();
      drawGraph();
      saveState();
    }, { passive: false });

    function saveState() {
      localStorage.setItem('graphState', JSON.stringify({
        mode, functions, paramFuncs, polarFuncs, variables,
        xMin, xMax, yMin, yMax
      }));
    }

    function loadState() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('s')) {
          const state = JSON.parse(atob(urlParams.get('s')));
          mode = state.mode || 'func';
          functions = state.functions || functions;
          paramFuncs = state.paramFuncs || paramFuncs;
          polarFuncs = state.polarFuncs || polarFuncs;
          xMin = state.xMin ?? -10;
          xMax = state.xMax ?? 10;
          yMin = state.yMin ?? -10;
          yMax = state.yMax ?? 10;
        } else {
          const saved = localStorage.getItem('graphState');
          if (saved) {
            const state = JSON.parse(saved);
            mode = state.mode || 'func';
            functions = state.functions || functions;
            paramFuncs = state.paramFuncs || paramFuncs;
            polarFuncs = state.polarFuncs || polarFuncs;
            xMin = state.xMin ?? -10;
            xMax = state.xMax ?? 10;
            yMin = state.yMin ?? -10;
            yMax = state.yMax ?? 10;
          }
        }
        setMode(mode);
        updateAxisInputs();
      } catch (e) { console.log('Load error:', e); }
    }

    // Init
    generateFuncInputs();
    generateSliders();
    loadState();
    drawGraph();
    window.addEventListener('resize', drawGraph);
  </script>
</body>
</html>
