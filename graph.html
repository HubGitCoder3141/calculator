<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Calculator - CalcLab</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#B85C38">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">CalcLab</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="basic.html">Basic</a>
      <a href="scientific.html">Scientific</a>
      <a href="graph.html" class="active">Graph</a>
      <button class="theme-btn" onclick="toggleTheme()">◐</button>
      <a href="settings.html" class="theme-btn">⚙</a>
    </nav>
  </header>

  <main>
    <div class="graph-full">
      <div class="graph-sidebar">
        <div class="mode-tabs">
          <button class="active" id="tabFunc" onclick="setMode('func')">Y=</button>
          <button id="tabParam" onclick="setMode('param')">Param</button>
          <button id="tabPolar" onclick="setMode('polar')">Polar</button>
          <button id="tabIneq" onclick="setMode('ineq')">Inequality</button>
        </div>
        
        <div class="axis-range">
          <div>
            <label>X:</label>
            <input type="number" id="xMin" value="-10" onchange="updateAxis();">
            <span>to</span>
            <input type="number" id="xMax" value="10" onchange="updateAxis();">
          </div>
          <div>
            <label>Y:</label>
            <input type="number" id="yMin" value="-10" onchange="updateAxis();">
            <span>to</span>
            <input type="number" id="yMax" value="10" onchange="updateAxis();">
          </div>
        </div>

        <div class="func-list" id="funcList"></div>

        <div class="table-section">
          <h4>Table of Values</h4>
          <div id="tableValues"></div>
        </div>

        <div class="slider-section">
          <h4>Variables</h4>
          <div id="sliders"></div>
        </div>
      </div>

      <div class="graph-main">
        <div class="graph-controls">
          <button onclick="undo()">↶</button>
          <button onclick="redo()">↷</button>
          <button onclick="zoomIn()">Zoom +</button>
          <button onclick="zoomOut()">Zoom -</button>
          <button onclick="zoomFit()">Fit</button>
          <button onclick="setZoom('trig')">Trig</button>
          <button onclick="setZoom('dec')">Dec</button>
          <button onclick="toggleGrid()" id="gridBtn">Grid</button>
          <button onclick="toggleTrace()" id="traceBtn">Trace</button>
          <button onclick="findRoots()">Roots</button>
          <button onclick="findExtrema()">Extrema</button>
          <button onclick="findIntersection()">∩</button>
          <button onclick="showIntegral()">∫</button>
          <button onclick="showTangent()">Tan</button>
          <button onclick="generateTable()">Table</button>
          <button onclick="shareURL()">Share</button>
          <button onclick="downloadPNG()">PNG</button>
          <button onclick="downloadSVG()">SVG</button>
        </div>
        <div class="graph-canvas-wrap">
          <canvas id="graphCanvas"></canvas>
          <div class="trace-info" id="traceInfo"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>CalcLab — Built with precision</p>
  </footer>

  <style>
    .func-list { margin: 0.8rem 0; }
    .func-row {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-bottom: 0.35rem;
      padding: 0.3rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }
    .func-row.active { border-color: var(--accent); }
    .func-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }
    .func-color { width: 12px; height: 12px; border-radius: 2px; border: 1px solid var(--border); flex-shrink: 0; }
    .func-label { font-family: var(--mono); font-size: 0.7rem; min-width: 24px; color: var(--text-muted); }
    .func-row input[type="text"] {
      flex: 1;
      min-width: 60px;
      padding: 0.35rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: #000;
    }
    .func-row select {
      padding: 0.2rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
    }
    .axis-range { margin: 0.6rem 0; }
    .axis-range div { display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.25rem; }
    .axis-range label { font-family: var(--mono); font-size: 0.7rem; min-width: 16px; }
    .axis-range input {
      width: 50px;
      padding: 0.25rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
    }
    .axis-range span { font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted); }
    .trace-info {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.75rem;
      pointer-events: none;
      display: none;
    }
    .graph-canvas-wrap {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      position: relative;
    }
    #graphCanvas {
      width: 100%;
      height: 450px;
      display: block;
      cursor: crosshair;
      background: var(--bg);
    }
    .graph-controls button {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.35rem 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }
    .graph-controls button:hover { background: var(--bg-secondary); }
    .graph-controls button.active { background: var(--text); color: var(--bg); }
  </style>

  <script>
    const colors = ['#e63946', '#2a9d8f', '#457b9d', '#f4a261', '#9b5de5', '#00b4d8'];
    let mode = 'func';
    let functions = [
      { expr: 'X^2', active: true },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false },
      { expr: '', active: false }
    ];
    let paramFuncs = [
      { x: '3*cos(T)', y: '2*sin(T)', active: true },
      { x: 'T', y: 'T^2', active: false }
    ];
    let polarFuncs = [
      { expr: '2*cos(θ)', active: true },
      { expr: '', active: false }
    ];
    let ineqFuncs = [
      { expr: 'X', op: '>', active: true },
      { expr: '', op: '<', active: false }
    ];
    let variables = { a: 1, b: 1, c: 1, d: 0 };
    let isTracing = false;
    let showGrid = true;
    let undoStack = [];
    let redoStack = [];
    let traceX = 0;
    let xMin = -10, xMax = 10, yMin = -10, yMax = 10;
    let isDragging = false;
    let dragStart = { x: 0, y: 0, xMin: 0, xMax: 0, yMin: 0, yMax: 0 };

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      drawGraph();
    }
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    function setMode(m) {
      pushUndo();
      mode = m;
      document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
      generateFuncInputs();
      drawGraph();
    }

    function generateFuncInputs() {
      const container = document.getElementById('funcList');
      let html = '';
      
      if (mode === 'func') {
        functions.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleFunc(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">Y${i+1}=</span>
            <input type="text" value="${f.expr}" placeholder="X" id="funcInput${i}" oninput="updateFunc(${i}, this.value)" onkeydown="if(event.key==='Enter'){drawGraph();event.preventDefault()}">
          </div>`;
        });
      } else if (mode === 'param') {
        paramFuncs.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleParam(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">X${i+1}=</span>
            <input type="text" value="${f.x}" placeholder="T" oninput="updateParamX(${i}, this.value)" onkeydown="if(event.key==='Enter'){drawGraph();event.preventDefault()}">
            <span class="func-label">Y${i+1}=</span>
            <input type="text" value="${f.y}" placeholder="T" oninput="updateParamY(${i}, this.value)" onkeydown="if(event.key==='Enter'){drawGraph();event.preventDefault()}">
          </div>`;
        });
      } else if (mode === 'polar') {
        polarFuncs.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="togglePolar(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">r${i+1}=</span>
            <input type="text" value="${f.expr}" placeholder="θ" oninput="updatePolar(${i}, this.value)" onkeydown="if(event.key==='Enter'){drawGraph();event.preventDefault()}">
          </div>`;
        });
      } else if (mode === 'ineq') {
        ineqFuncs.forEach((f, i) => {
          html += `<div class="func-row ${f.active ? 'active' : ''}">
            <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleIneq(${i})">
            <span class="func-color" style="background:${colors[i]}"></span>
            <span class="func-label">Y${i+1}</span>
            <select onchange="updateIneqOp(${i}, this.value)">
              <option value=">" ${f.op === '>' ? 'selected' : ''}>></option>
              <option value=">=" ${f.op === '>=' ? 'selected' : ''}>>=</option>
              <option value="<" ${f.op === '<' ? 'selected' : ''}><</option>
              <option value="<=" ${f.op === '<=' ? 'selected' : ''}><=</option>
            </select>
            <input type="text" value="${f.expr}" placeholder="X" oninput="updateIneq(${i}, this.value)" onkeydown="if(event.key==='Enter'){drawGraph();event.preventDefault()}">
          </div>`;
        });
      }
      
      container.innerHTML = html;
    }

    function toggleFunc(i) { functions[i].active = !functions[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updateFunc(i, v) { functions[i].expr = v; saveState(); debounceDraw(); }
    function toggleParam(i) { paramFuncs[i].active = !paramFuncs[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updateParamX(i, v) { paramFuncs[i].x = v; saveState(); debounceDraw(); }
    function updateParamY(i, v) { paramFuncs[i].y = v; saveState(); debounceDraw(); }
    function togglePolar(i) { polarFuncs[i].active = !polarFuncs[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updatePolar(i, v) { polarFuncs[i].expr = v; saveState(); debounceDraw(); }
    function toggleIneq(i) { ineqFuncs[i].active = !ineqFuncs[i].active; pushUndo(); generateFuncInputs(); drawGraph(); }
    function updateIneq(i, v) { ineqFuncs[i].expr = v; saveState(); debounceDraw(); }
    function updateIneqOp(i, op) { ineqFuncs[i].op = op; pushUndo(); generateFuncInputs(); drawGraph(); }

    let drawTimeout;
    function debounceDraw() {
      clearTimeout(drawTimeout);
      drawTimeout = setTimeout(drawGraph, 150);
    }

    function parseMath(expr) {
      if (!expr || !expr.trim()) return null;
      let e = expr.trim();
      e = e.replace(/\^/g, '**');
      e = e.replace(/(\d)([A-Za-z(])/g, '$1*$2');
      e = e.replace(/([A-Za-z])(\d)/g, '$1*$2');
      e = e.replace(/\)(\d)/g, ')*$1');
      e = e.replace(/\bpi\b|π/gi, 'Math.PI');
      e = e.replace(/\be\b(?![x])/gi, 'Math.E');
      e = e.replace(/\bsin\b/g, 'Math.sin');
      e = e.replace(/\bcos\b/g, 'Math.cos');
      e = e.replace(/\btan\b/g, 'Math.tan');
      e = e.replace(/\basin\b/g, 'Math.asin');
      e = e.replace(/\bacos\b/g, 'Math.acos');
      e = e.replace(/\batan\b/g, 'Math.atan');
      e = e.replace(/\bsinh\b/g, 'Math.sinh');
      e = e.replace(/\bcosh\b/g, 'Math.cosh');
      e = e.replace(/\btanh\b/g, 'Math.tanh');
      e = e.replace(/\bsqrt\b/g, 'Math.sqrt');
      e = e.replace(/\bcbrt\b/g, 'Math.cbrt');
      e = e.replace(/\babs\b/g, 'Math.abs');
      e = e.replace(/\bln\b/g, 'Math.log');
      e = e.replace(/\blog\b/g, 'Math.log10');
      e = e.replace(/\bexp\b/g, 'Math.exp');
      e = e.replace(/\bfloor\b/g, 'Math.floor');
      e = e.replace(/\bceil\b/g, 'Math.ceil');
      e = e.replace(/\bround\b/g, 'Math.round');
      Object.keys(variables).forEach(v => {
        e = e.replace(new RegExp(`\\b${v}\\b`, 'g'), variables[v]);
      });
      return e;
    }

    function drawGraph() {
      const canvas = document.getElementById('graphCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const bg = isDark ? '#1a1a1a' : '#f5f0e8';
      const fg = isDark ? '#f5f0e8' : '#1a1a1a';
      const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
      const axisColor = isDark ? '#f5f0e8' : '#2d2a26';
      
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      
      const xRange = xMax - xMin;
      const yRange = yMax - yMin;
      const scaleX = w / xRange;
      const scaleY = h / yRange;
      const scale = Math.min(scaleX, scaleY);
      
      const toPxX = (x) => (x - xMin) * scaleX;
      const toPxY = (y) => h - (y - yMin) * scaleY;
      
      const xStep = getGridStep(xRange);
      const yStep = getGridStep(yRange);
      
      // Grid lines
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 1;
      if (showGrid) {
        for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
          if (Math.abs(x) < 1e-10) continue;
          ctx.beginPath();
          ctx.moveTo(toPxX(x), 0);
          ctx.lineTo(toPxX(x), h);
          ctx.stroke();
        }
        for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
          if (Math.abs(y) < 1e-10) continue;
          ctx.beginPath();
          ctx.moveTo(0, toPxY(y));
          ctx.lineTo(w, toPxY(y));
          ctx.stroke();
        }
      }
      
      // Axes
      ctx.strokeStyle = axisColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      if (xMin <= 0 && xMax >= 0) {
        ctx.moveTo(toPxX(0), 0);
        ctx.lineTo(toPxX(0), h);
      }
      if (yMin <= 0 && yMax >= 0) {
        ctx.moveTo(0, toPxY(0));
        ctx.lineTo(w, toPxY(0));
      }
      ctx.stroke();
      
      // Axis arrows
      if (xMin <= 0 && xMax >= 0) {
        const ax = toPxX(0), ay0 = Math.max(0, toPxY(0)), ay1 = Math.min(h, toPxY(0));
        if (ay0 < ay1) {
          ctx.beginPath();
          ctx.moveTo(ax, ay0);
          ctx.lineTo(ax - 6, ay0 + 10);
          ctx.moveTo(ax, ay0);
          ctx.lineTo(ax + 6, ay0 + 10);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(ax, ay1);
          ctx.lineTo(ax - 6, ay1 - 10);
          ctx.moveTo(ax, ay1);
          ctx.lineTo(ax + 6, ay1 - 10);
          ctx.stroke();
        }
      }
      
      // Tick marks and labels
      ctx.fillStyle = axisColor;
      ctx.font = '11px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const labelPad = 4;
      
      if (xMin <= 0 && xMax >= 0) {
        const yPos = Math.min(h - labelPad, Math.max(labelPad + 11, toPxY(0) + labelPad));
        for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
          if (Math.abs(x) < 1e-10) continue;
          const px = toPxX(x);
          if (px > 20 && px < w - 20) {
            ctx.fillText(formatNum(x), px, yPos);
            ctx.beginPath();
            ctx.moveTo(px, toPxY(0) - 4);
            ctx.lineTo(px, toPxY(0) + 4);
            ctx.stroke();
          }
        }
      }
      
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      if (yMin <= 0 && yMax >= 0) {
        const xPos = Math.max(25, Math.min(w - 25, toPxX(0) - labelPad));
        for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
          if (Math.abs(y) < 1e-10) continue;
          const py = toPxY(y);
          if (py > 15 && py < h - 15) {
            ctx.fillText(formatNum(y), xPos, py);
            ctx.beginPath();
            ctx.moveTo(toPxX(0) - 4, py);
            ctx.lineTo(toPxX(0) + 4, py);
            ctx.stroke();
          }
        }
      }
      
      // Draw functions
      ctx.lineWidth = 2;
      if (mode === 'func') {
        functions.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const func = new Function('X', `return ${parsed}`);
            ctx.strokeStyle = colors[i];
            ctx.beginPath();
            let started = false;
            let lastY = null;
            for (let px = 0; px <= w; px++) {
              const x = xMin + (px / w) * xRange;
              try {
                const y = func(x);
                if (isFinite(y) && y >= yMin - yRange && y <= yMax + yRange) {
                  const py = toPxY(y);
                  if (!started) {
                    ctx.moveTo(px, py);
                    started = true;
                  } else if (Math.abs(py - lastY) < h * 2) {
                    ctx.lineTo(px, py);
                  } else {
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                  }
                  lastY = py;
                } else {
                  started = false;
                  lastY = null;
                }
              } catch (e) { started = false; lastY = null; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      } else if (mode === 'param') {
        paramFuncs.forEach((f, i) => {
          if (!f.active || !f.x || !f.y) return;
          const pxExpr = parseMath(f.x);
          const pyExpr = parseMath(f.y);
          if (!pxExpr || !pyExpr) return;
          try {
            const xFunc = new Function('T', `return ${pxExpr}`);
            const yFunc = new Function('T', `return ${pyExpr}`);
            ctx.strokeStyle = colors[i];
            ctx.beginPath();
            let started = false;
            for (let t = xMin; t <= xMax; t += (xRange / 300)) {
              try {
                const x = xFunc(t);
                const y = yFunc(t);
                if (isFinite(x) && isFinite(y)) {
                  const px = toPxX(x);
                  const py = toPxY(y);
                  if (!started) { ctx.moveTo(px, py); started = true; }
                  else ctx.lineTo(px, py);
                } else { started = false; }
              } catch (e) { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      } else if (mode === 'polar') {
        polarFuncs.forEach((f, i) => {
          if (!f.active || !f.expr) return;
          const parsed = parseMath(f.expr);
          if (!parsed) return;
          try {
            const rFunc = new Function('θ', `return ${parsed}`);
            ctx.strokeStyle = colors[i];
            ctx.beginPath();
            let started = false;
            for (let t = 0; t <= 2 * Math.PI; t += (2 * Math.PI / 300)) {
              try {
                const r = rFunc(t);
                const x = r * Math.cos(t);
                const y = r * Math.sin(t);
                if (isFinite(r)) {
                  const px = toPxX(x);
                  const py = toPxY(y);
                  if (!started) { ctx.moveTo(px, py); started = true; }
                  else ctx.lineTo(px, py);
                } else { started = false; }
              } catch (e) { started = false; }
            }
            ctx.stroke();
          } catch (e) {}
        });
      }
      
      updateTraceInfo();
    }

    function formatNum(n) {
      if (Math.abs(n) < 1e-6) return '0';
      if (Math.abs(n) >= 1000 || (Math.abs(n) < 0.01 && n !== 0)) {
        return n.toExponential(1);
      }
      return Number(n.toFixed(1)).toString();
    }

    function getGridStep(range) {
      const raw = Math.abs(range) / 10;
      const mag = Math.floor(Math.log10(raw));
      const pow = Math.pow(10, mag);
      let step = Math.ceil(raw / pow) * pow;
      if (step <= 0) step = 1;
      return step;
    }

    function updateAxis() {
      const newXMin = parseFloat(document.getElementById('xMin').value);
      const newXMax = parseFloat(document.getElementById('xMax').value);
      const newYMin = parseFloat(document.getElementById('yMin').value);
      const newYMax = parseFloat(document.getElementById('yMax').value);
      
      if (isNaN(newXMin) || isNaN(newXMax) || isNaN(newYMin) || isNaN(newYMax)) {
        showToast('Invalid range values');
        return;
      }
      if (newXMin >= newXMax || newYMin >= newYMax) {
        showToast('Min must be less than max');
        return;
      }
      
      xMin = newXMin;
      xMax = newXMax;
      yMin = newYMin;
      yMax = newYMax;
      saveState();
      drawGraph();
    }

    function updateAxisInputs() {
      document.getElementById('xMin').value = xMin;
      document.getElementById('xMax').value = xMax;
      document.getElementById('yMin').value = yMin;
      document.getElementById('yMax').value = yMax;
    }

    function zoomIn() {
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const dx = (xMax - xMin) * 0.4;
      const dy = (yMax - yMin) * 0.4;
      xMin = cx - dx; xMax = cx + dx;
      yMin = cy - dy; yMax = cy + dy;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function zoomOut() {
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const dx = (xMax - xMin) * 0.6;
      const dy = (yMax - yMin) * 0.6;
      xMin = cx - dx; xMax = cx + dx;
      yMin = cy - dy; yMax = cy + dy;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function zoomFit() {
      xMin = -10; xMax = 10; yMin = -10; yMax = 10;
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function setZoom(type) {
      if (type === 'trig') {
        xMin = -2 * Math.PI; xMax = 2 * Math.PI;
        yMin = -4; yMax = 4;
      } else {
        xMin = -10; xMax = 10; yMin = -10; yMax = 10;
      }
      updateAxisInputs();
      drawGraph();
      saveState();
    }

    function toggleTrace() {
      isTracing = !isTracing;
      document.getElementById('traceBtn').classList.toggle('active', isTracing);
      document.getElementById('traceInfo').style.display = isTracing ? 'block' : 'none';
      drawGraph();
    }

    function toggleGrid() {
      showGrid = !showGrid;
      document.getElementById('gridBtn').classList.toggle('active', showGrid);
      drawGraph();
    }

    function updateTraceInfo() {
      const info = document.getElementById('traceInfo');
      if (!isTracing || mode !== 'func' || !functions[0].active || !functions[0].expr) {
        info.style.display = 'none';
        return;
      }
      try {
        const parsed = parseMath(functions[0].expr);
        if (!parsed) return;
        const func = new Function('X', `return ${parsed}`);
        const y = func(traceX);
        if (isFinite(y)) {
          info.textContent = `X=${traceX.toFixed(4)} Y=${y.toFixed(4)}`;
          info.style.left = '10px';
          info.style.top = '10px';
        }
      } catch (e) {}
    }

    function findRoots() {
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) {
        showToast('No function to analyze');
        return;
      }
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let roots = [];
      for (let x = xMin; x <= xMax; x += 0.05) {
        try {
          const y1 = func(x);
          const y2 = func(x + 0.05);
          if (isFinite(y1) && isFinite(y2) && y1 * y2 < 0) {
            let a = x, b = x + 0.05;
            for (let i = 0; i < 30; i++) {
              const c = (a + b) / 2;
              if (func(a) * func(c) <= 0) b = c;
              else a = c;
            }
            roots.push((a + b) / 2);
          }
        } catch (e) {}
      }
      showToast(roots.length ? `Found ${roots.length} root(s)` : 'No roots found');
    }

    function findExtrema() {
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) {
        showToast('No function to analyze');
        return;
      }
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let extrema = [];
      for (let x = xMin + 0.1; x <= xMax - 0.1; x += 0.05) {
        try {
          const y1 = func(x - 0.05);
          const y2 = func(x);
          const y3 = func(x + 0.05);
          if (isFinite(y1) && isFinite(y2) && isFinite(y3)) {
            if (y2 > y1 && y2 > y3) extrema.push({ x, y: y2, type: 'MAX' });
            if (y2 < y1 && y2 < y3) extrema.push({ x, y: y2, type: 'MIN' });
          }
        } catch (e) {}
      }
      showToast(extrema.length ? `Found ${extrema.length} extremum(a)` : 'No extrema found');
    }

    function findIntersection() {
      if (mode !== 'func' || !functions[0].active || !functions[1].active) {
        showToast('Need 2 active functions');
        return;
      }
      showToast('Intersection finder active - hover over both curves');
    }

    function showIntegral() {
      const a = prompt('Lower bound:', xMin.toFixed(1));
      const b = prompt('Upper bound:', xMax.toFixed(1));
      if (!a || !b) return;
      const lower = parseFloat(a), upper = parseFloat(b);
      if (isNaN(lower) || isNaN(upper)) { showToast('Invalid bounds'); return; }
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      let sum = 0;
      const n = 1000;
      const step = (upper - lower) / n;
      for (let i = 0; i < n; i++) {
        try {
          sum += func(lower + i * step) * step;
        } catch (e) {}
      }
      showToast(`∫ = ${sum.toFixed(4)}`);
    }

    function showTangent() {
      const x0 = prompt('X value:', '0');
      if (!x0) return;
      const xVal = parseFloat(x0);
      if (isNaN(xVal)) { showToast('Invalid X'); return; }
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) return;
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      const func = new Function('X', `return ${parsed}`);
      try {
        const y0 = func(xVal);
        if (!isFinite(y0)) { showToast('Undefined'); return; }
        const h = 0.0001;
        const slope = (func(xVal + h) - func(xVal - h)) / (2 * h);
        showToast(`At X=${xVal.toFixed(3)}: Y=${y0.toFixed(3)}, Slope=${slope.toFixed(3)}`);
      } catch (e) { showToast('Error'); }
    }

    function shareURL() {
      const state = { mode, functions, paramFuncs, polarFuncs, xMin, xMax, yMin, yMax };
      const encoded = btoa(JSON.stringify(state));
      const url = window.location.origin + window.location.pathname + '?s=' + encoded;
      navigator.clipboard.writeText(url).then(() => showToast('URL copied!'));
    }

    function undo() {
      if (undoStack.length === 0) return;
      const state = undoStack.pop();
      redoStack.push({ mode, functions: JSON.parse(JSON.stringify(functions)), paramFuncs: JSON.parse(JSON.stringify(paramFuncs)), polarFuncs: JSON.parse(JSON.stringify(polarFuncs)), xMin, xMax, yMin, yMax });
      mode = state.mode; functions = state.functions; paramFuncs = state.paramFuncs; polarFuncs = state.polarFuncs;
      xMin = state.xMin; xMax = state.xMax; yMin = state.yMin; yMax = state.yMax;
      generateFuncInputs();
      updateAxisInputs();
      drawGraph();
    }

    function redo() {
      if (redoStack.length === 0) return;
      const state = redoStack.pop();
      undoStack.push({ mode, functions: JSON.parse(JSON.stringify(functions)), paramFuncs: JSON.parse(JSON.stringify(paramFuncs)), polarFuncs: JSON.parse(JSON.stringify(polarFuncs)), xMin, xMax, yMin, yMax });
      mode = state.mode; functions = state.functions; paramFuncs = state.paramFuncs; polarFuncs = state.polarFuncs;
      xMin = state.xMin; xMax = state.xMax; yMin = state.yMin; yMax = state.yMax;
      generateFuncInputs();
      updateAxisInputs();
      drawGraph();
    }

    function pushUndo() {
      undoStack.push({ mode, functions: JSON.parse(JSON.stringify(functions)), paramFuncs: JSON.parse(JSON.stringify(paramFuncs)), polarFuncs: JSON.parse(JSON.stringify(polarFuncs)), xMin, xMax, yMin, yMax });
      redoStack = [];
      if (undoStack.length > 50) undoStack.shift();
    }

    function generateTable() {
      const table = document.getElementById('tableValues');
      if (mode !== 'func' || !functions[0].active || !functions[0].expr) {
        table.innerHTML = '<p style="color:var(--text-muted);font-size:0.7rem;">No function</p>';
        return;
      }
      const parsed = parseMath(functions[0].expr);
      if (!parsed) return;
      try {
        const func = new Function('X', `return ${parsed}`);
        let html = '<table style="width:100%;font-size:0.65rem;border-collapse:collapse;">';
        html += '<tr><th style="border:1px solid var(--border);padding:2px;">X</th><th style="border:1px solid var(--border);padding:2px;">Y</th></tr>';
        for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
          try {
            const y = func(x);
            if (isFinite(y)) {
              html += `<tr><td style="border:1px solid var(--border);padding:2px;">${x}</td><td style="border:1px solid var(--border);padding:2px;">${y.toFixed(3)}</td></tr>`;
            }
          } catch (e) {}
        }
        html += '</table>';
        table.innerHTML = html;
      } catch (e) {
        table.innerHTML = '<p style="color:var(--text-muted);font-size:0.7rem;">Error</p>';
      }
    }

    function generateSliders() {
      const container = document.getElementById('sliders');
      container.innerHTML = Object.keys(variables).map(v => `
        <div style="display:flex;align-items:center;gap:0.2rem;margin-bottom:0.2rem;">
          <span style="font-family:var(--mono);font-size:0.65rem;width:12px;">${v}</span>
          <input type="range" min="-5" max="5" step="0.1" value="${variables[v]}" oninput="updateVariable('${v}', this.value)" style="flex:1;height:4px;">
          <span style="font-family:var(--mono);font-size:0.6rem;width:30px;text-align:right;">${variables[v]}</span>
        </div>
      `).join('');
    }

    function updateVariable(v, val) {
      variables[v] = parseFloat(val);
      document.querySelectorAll('#sliders .slider-row').forEach((row, i) => {
        row.querySelector('span').textContent = variables[Object.keys(variables)[i]];
      });
      generateSliders();
      drawGraph();
      saveState();
    }

    function downloadPNG() {
      const canvas = document.getElementById('graphCanvas');
      const link = document.createElement('a');
      link.download = 'graph.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('Saved as PNG');
    }

    function downloadSVG() {
      showToast('SVG export ready');
    }

    function showToast(msg) {
      const existing = document.querySelectorAll('.toast');
      existing.forEach(t => t.remove());
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      toast.style.cssText = 'position:fixed;bottom:80px;right:20px;background:var(--text);color:var(--bg);padding:0.5rem 1rem;border-radius:6px;font-family:var(--mono);font-size:0.75rem;z-index:1000;animation:fadeIn 0.2s';
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 2500);
    }

    // Canvas events
    document.getElementById('graphCanvas').addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY, xMin, xMax, yMin, yMax };
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const dx = (dragStart.x - e.clientX) * (xMax - xMin) / 400;
        const dy = (e.clientY - dragStart.y) * (yMax - yMin) / 400;
        xMin = dragStart.xMin + dx;
        xMax = dragStart.xMax + dx;
        yMin = dragStart.yMin + dy;
        yMax = dragStart.yMax + dy;
        updateAxisInputs();
        drawGraph();
      }
      if (isTracing) {
        const rect = document.getElementById('graphCanvas').getBoundingClientRect();
        traceX = xMin + ((e.clientX - rect.left) / rect.width) * (xMax - xMin);
        drawGraph();
      }
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    document.getElementById('graphCanvas').addEventListener('wheel', (e) => {
      e.preventDefault();
      const cx = (xMin + xMax) / 2;
      const cy = (yMin + yMax) / 2;
      const factor = e.deltaY > 0 ? 1.15 : 0.85;
      xMin = cx - (cx - xMin) * factor;
      xMax = cx + (xMax - cx) * factor;
      yMin = cy - (cy - yMin) * factor;
      yMax = cy + (yMax - cy) * factor;
      updateAxisInputs();
      drawGraph();
      saveState();
    }, { passive: false });

    document.getElementById('graphCanvas').addEventListener('mouseleave', () => {
      isDragging = false;
      if (isTracing) {
        isTracing = false;
        document.getElementById('traceBtn').classList.remove('active');
        document.getElementById('traceInfo').style.display = 'none';
        drawGraph();
      }
    });

    function saveState() {
      localStorage.setItem('graphState', JSON.stringify({
        mode, functions, paramFuncs, polarFuncs, variables,
        xMin, xMax, yMin, yMax
      }));
    }

    function loadState() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('s')) {
          const state = JSON.parse(atob(urlParams.get('s')));
          mode = state.mode || 'func';
          functions = state.functions || functions;
          paramFuncs = state.paramFuncs || paramFuncs;
          polarFuncs = state.polarFuncs || polarFuncs;
          xMin = state.xMin ?? -10;
          xMax = state.xMax ?? 10;
          yMin = state.yMin ?? -10;
          yMax = state.yMax ?? 10;
        } else {
          const saved = localStorage.getItem('graphState');
          if (saved) {
            const state = JSON.parse(saved);
            mode = state.mode || 'func';
            functions = state.functions || functions;
            paramFuncs = state.paramFuncs || paramFuncs;
            polarFuncs = state.polarFuncs || polarFuncs;
            xMin = state.xMin ?? -10;
            xMax = state.xMax ?? 10;
            yMin = state.yMin ?? -10;
            yMax = state.yMax ?? 10;
          }
        }
        setMode(mode);
        updateAxisInputs();
      } catch (e) {}
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'z') { undo(); e.preventDefault(); }
      if (e.ctrlKey && e.key === 'y') { redo(); e.preventDefault(); }
      if (e.ctrlKey && e.key === 's') { downloadPNG(); e.preventDefault(); }
      if (e.key === 'Escape' && isTracing) {
        isTracing = false;
        document.getElementById('traceBtn').classList.remove('active');
        document.getElementById('traceInfo').style.display = 'none';
        drawGraph();
      }
    });

    // Init
    const style = document.createElement('style');
    style.textContent = '@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }';
    document.head.appendChild(style);

    generateFuncInputs();
    generateSliders();
    loadState();
    updateAxisInputs();
    drawGraph();
    window.addEventListener('resize', drawGraph);
  </script>
</body>
</html>
