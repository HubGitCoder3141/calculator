<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator - CalcLab</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#B85C38">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">CalcLab</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="basic.html">Basic</a>
      <a href="scientific.html" class="active">Scientific</a>
      <a href="graph.html">Graph</a>
      <button class="theme-btn" onclick="toggleTheme()">◐</button>
      <a href="settings.html" class="theme-btn">⚙</a>
    </nav>
  </header>

  <main class="calc-page">
    <div class="calc-header">
      <h1>Scientific Calculator</h1>
      <p>Advanced mathematical functions</p>
      <div class="mode-toggle">
        <button id="degBtn" onclick="setAngle('DEG')">DEG</button>
        <button id="radBtn" class="active" onclick="setAngle('RAD')">RAD</button>
        <button id="gradBtn" onclick="setAngle('GRAD')">GRAD</button>
      </div>
    </div>
    <div class="calculator-container">
      <div class="calc-wrapper">
        <div class="calc-display">
          <div class="display-toolbar">
            <button class="toolbar-btn" onclick="copyResult()" title="Copy">📋</button>
            <button class="toolbar-btn" onclick="clearHistory()" title="Clear history">🗑️</button>
          </div>
          <div class="expression" id="expr"></div>
          <div class="result" id="result">0</div>
          <div class="memory-indicator" id="memIndicator"></div>
        </div>
        <div class="calc-buttons scientific">
          <button class="calc-btn func" onclick="memoryClear()">MC</button>
          <button class="calc-btn func" onclick="memoryRecall()">MR</button>
          <button class="calc-btn func" onclick="memoryAdd()">M+</button>
          <button class="calc-btn func" onclick="memorySub()">M-</button>
          <button class="calc-btn clear" onclick="clearAll()">C</button>
          <button class="calc-btn" onclick="clearEntry()">CE</button>
          <button class="calc-btn" onclick="backspace()">⌫</button>
          <button class="calc-btn func" onclick="input('(')">(</button>
          <button class="calc-btn func" onclick="input(')')">)</button>
          
          <button class="calc-btn func" onclick="sciFunc('sin')">sin</button>
          <button class="calc-btn func" onclick="sciFunc('cos')">cos</button>
          <button class="calc-btn func" onclick="sciFunc('tan')">tan</button>
          <button class="calc-btn func" onclick="sciFunc('asin')">sin⁻¹</button>
          <button class="calc-btn func" onclick="sciFunc('sqrt')">√</button>
          <button class="calc-btn func" onclick="sciFunc('sq')">x²</button>
          <button class="calc-btn func" onclick="sciFunc('pow')">xʸ</button>
          <button class="calc-btn operator" onclick="operator('/')">÷</button>
          
          <button class="calc-btn func" onclick="sciFunc('asin')">cos⁻¹</button>
          <button class="calc-btn func" onclick="sciFunc('acos')">acos</button>
          <button class="calc-btn func" onclick="sciFunc('atan')">tan⁻¹</button>
          <button class="calc-btn func" onclick="sciFunc('cbrt')">∛</button>
          <button class="calc-btn func" onclick="sciFunc('abs')">|x|</button>
          <button class="calc-btn func" onclick="sciFunc('inv')">1/x</button>
          <button class="calc-btn func" onclick="sciFunc('fact')">n!</button>
          <button class="calc-btn operator" onclick="operator('-')">−</button>
          
          <button class="calc-btn func" onclick="sciFunc('log')">log</button>
          <button class="calc-btn func" onclick="sciFunc('ln')">ln</button>
          <button class="calc-btn func" onclick="sciFunc('exp')">eˣ</button>
          <button class="calc-btn func" onclick="sciFunc('10x')">10ˣ</button>
          <button class="calc-btn func" onclick="inputPi()">π</button>
          <button class="calc-btn func" onclick="inputE()">e</button>
          <button class="calc-btn func" onclick="sciFunc('floor')">⌊⌋</button>
          <button class="calc-btn operator" onclick="operator('+')">+</button>
          
          <button class="calc-btn" onclick="digit('7')">7</button>
          <button class="calc-btn" onclick="digit('8')">8</button>
          <button class="calc-btn" onclick="digit('9')">9</button>
          <button class="calc-btn func" onclick="sciFunc('sinh')">sinh</button>
          <button class="calc-btn func" onclick="sciFunc('asinh')">sinh⁻¹</button>
          <button class="calc-btn func" onclick="sciFunc('round')">rnd</button>
          <button class="calc-btn func" onclick="sciFunc('rand')">rand</button>
          <button class="calc-btn equals" onclick="equals()">=</button>
          
          <button class="calc-btn" onclick="digit('4')">4</button>
          <button class="calc-btn" onclick="digit('5')">5</button>
          <button class="calc-btn" onclick="digit('6')">6</button>
          <button class="calc-btn func" onclick="sciFunc('cosh')">cosh</button>
          <button class="calc-btn func" onclick="sciFunc('acosh')">cosh⁻¹</button>
          <button class="calc-btn func" onclick="sciFunc('ceil')">⌈⌉</button>
          <button class="calc-btn func" onclick="insertAns()">ANS</button>
          
          <button class="calc-btn" onclick="digit('1')">1</button>
          <button class="calc-btn" onclick="digit('2')">2</button>
          <button class="calc-btn" onclick="digit('3')">3</button>
          <button class="calc-btn func" onclick="sciFunc('tanh')">tanh</button>
          <button class="calc-btn func" onclick="sciFunc('atanh')">tanh⁻¹</button>
          <button class="calc-btn" onclick="decimal()">.</button>
          <button class="calc-btn func" onclick="sciFunc('mod')">mod</button>
          
          <button class="calc-btn" onclick="digit('0')">0</button>
          <button class="calc-btn" onclick="toggleSign()">±</button>
          <button class="calc-btn func" onclick="sciFunc('pct')">%</button>
        </div>
      </div>
      <div class="history-panel">
        <h3>History <button onclick="clearHistory()">Clear</button></h3>
        <div id="history"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>CalcLab — Built with precision</p>
  </footer>

  <script>
    let current = '0';
    let expression = '';
    let memory = 0;
    let lastAnswer = 0;
    let angleMode = 'RAD';
    let justEqualed = false;

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
    }
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    function setAngle(mode) {
      playClick();
      angleMode = mode;
      document.getElementById('degBtn').classList.toggle('active', mode === 'DEG');
      document.getElementById('radBtn').classList.toggle('active', mode === 'RAD');
      document.getElementById('gradBtn').classList.toggle('active', mode === 'GRAD');
    }

    function toRad(val) {
      if (angleMode === 'DEG') return val * Math.PI / 180;
      if (angleMode === 'GRAD') return val * Math.PI / 200;
      return val;
    }

    function fromRad(val) {
      if (angleMode === 'DEG') return val * 180 / Math.PI;
      if (angleMode === 'GRAD') return val * 200 / Math.PI;
      return val;
    }

    function update() {
      document.getElementById('result').textContent = current;
      document.getElementById('expr').textContent = expression;
      document.getElementById('memIndicator').textContent = memory !== 0 ? `M: ${formatNum(memory)}` : '';
    }

    function formatNum(n) {
      if (!isFinite(n)) return 'Error';
      const str = String(n);
      if (str.length > 12) return n.toExponential(6);
      return str;
    }

    function digit(d) {
      playClick();
      if (justEqualed) { current = d; expression = ''; justEqualed = false; }
      else if (current === '0' || current === 'Error') current = d;
      else if (current.length < 15) current += d;
      update();
    }

    function decimal() {
      playClick();
      if (justEqualed) { current = '0.'; expression = ''; justEqualed = false; }
      else if (!current.includes('.')) current += '.';
      update();
    }

    function input(val) {
      playClick();
      if (justEqualed) { current = val; expression = ''; justEqualed = false; }
      else if (current === '0' || current === 'Error') current = val;
      else current += val;
      update();
    }

    function inputPi() {
      playClick();
      current = String(Math.PI);
      justEqualed = false;
      update();
    }

    function inputE() {
      playClick();
      current = String(Math.E);
      justEqualed = false;
      update();
    }

    function toggleSign() {
      playClick();
      if (current !== '0' && current !== 'Error') {
        current = current.startsWith('-') ? current.slice(1) : '-' + current;
      }
      update();
    }

    function sciFunc(f) {
      playClick();
      const val = parseFloat(current);
      let result;
      
      try {
        switch (f) {
          case 'sin': result = Math.sin(toRad(val)); break;
          case 'cos': result = Math.cos(toRad(val)); break;
          case 'tan': 
            const tanVal = Math.cos(toRad(val));
            if (Math.abs(tanVal) < 1e-15) { current = 'Error'; update(); return; }
            result = Math.tan(toRad(val)); 
            break;
          case 'asin':
            if (val < -1 || val > 1) { current = 'Error'; update(); return; }
            result = fromRad(Math.asin(val)); break;
          case 'acos':
            if (val < -1 || val > 1) { current = 'Error'; update(); return; }
            result = fromRad(Math.acos(val)); break;
          case 'atan': result = fromRad(Math.atan(val)); break;
          case 'sinh': result = Math.sinh(val); break;
          case 'cosh': result = Math.cosh(val); break;
          case 'tanh': result = Math.tanh(val); break;
          case 'asinh': result = Math.asinh(val); break;
          case 'acosh':
            if (val < 1) { current = 'Error'; update(); return; }
            result = Math.acosh(val); break;
          case 'atanh':
            if (val <= -1 || val >= 1) { current = 'Error'; update(); return; }
            result = Math.atanh(val); break;
          case 'sqrt':
            if (val < 0) { current = 'Error'; update(); return; }
            result = Math.sqrt(val); break;
          case 'cbrt': result = Math.cbrt(val); break;
          case 'abs': result = Math.abs(val); break;
          case 'sq': result = val * val; break;
          case 'inv':
            if (val === 0) { current = 'Error'; update(); return; }
            result = 1 / val; break;
          case 'fact':
            if (val < 0 || !Number.isInteger(val) || val > 170) { current = 'Error'; update(); return; }
            result = factorial(val); break;
          case 'log':
            if (val <= 0) { current = 'Error'; update(); return; }
            result = Math.log10(val); break;
          case 'ln':
            if (val <= 0) { current = 'Error'; update(); return; }
            result = Math.log(val); break;
          case 'exp': result = Math.exp(val); break;
          case '10x': result = Math.pow(10, val); break;
          case 'floor': result = Math.floor(val); break;
          case 'ceil': result = Math.ceil(val); break;
          case 'round': result = Math.round(val); break;
          case 'rand': result = Math.random(); break;
          case 'mod':
            const mod = prompt('Modulo:', '2');
            if (mod === null) return;
            const m = parseFloat(mod);
            if (isNaN(m) || m === 0) { current = 'Error'; update(); return; }
            result = val % m; break;
          case 'pow':
            const p = prompt('Power:', '2');
            if (p === null) return;
            const pow = parseFloat(p);
            if (isNaN(pow)) { current = 'Error'; update(); return; }
            result = Math.pow(val, pow); break;
          case 'pct': result = val / 100; break;
          default: return;
        }
        current = formatNum(result);
        justEqualed = true;
      } catch (e) {
        current = 'Error';
      }
      update();
    }

    function factorial(n) {
      if (n === 0 || n === 1) return 1;
      let result = 1;
      for (let i = 2; i <= n; i++) result *= i;
      return result;
    }

    function operator(op) {
      playClick();
      expression = current + ' ' + (op === '*' ? '×' : op === '/' ? '÷' : op);
      justEqualed = false;
      update();
    }

    function equals() {
      playClick();
      const val = parseFloat(current);
      lastAnswer = val;
      addHistory(expression + ' =', val);
      current = formatNum(val);
      expression = '';
      justEqualed = true;
      update();
    }

    function insertAns() {
      playClick();
      current = String(lastAnswer);
      justEqualed = false;
      update();
    }

    function clearAll() {
      playClick();
      current = '0';
      expression = '';
      justEqualed = false;
      update();
    }

    function clearEntry() {
      playClick();
      current = '0';
      justEqualed = false;
      update();
    }

    function backspace() {
      playClick();
      if (current.length === 1 || current === 'Error') current = '0';
      else current = current.slice(0, -1);
      update();
    }

    function memoryClear() { playClick(); memory = 0; update(); }
    function memoryRecall() { playClick(); current = String(memory); justEqualed = false; update(); }
    function memoryAdd() { playClick(); memory += parseFloat(current) || 0; update(); }
    function memorySub() { playClick(); memory -= parseFloat(current) || 0; update(); }

    function copyResult() {
      navigator.clipboard.writeText(current).then(() => {
        const btn = document.querySelector('.toolbar-btn');
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = '📋', 1000);
      });
    }

    function addHistory(expr, result) {
      const hist = JSON.parse(localStorage.getItem('sciHistory') || '[]');
      hist.unshift({ expr, result: String(result), time: Date.now() });
      if (hist.length > 50) hist.pop();
      localStorage.setItem('sciHistory', JSON.stringify(hist));
      renderHistory();
    }

    function clearHistory() {
      if (confirm('Clear all history?')) {
        localStorage.removeItem('sciHistory');
        renderHistory();
      }
    }

    function deleteHistory(time) {
      const hist = JSON.parse(localStorage.getItem('sciHistory') || '[]');
      const filtered = hist.filter(h => h.time !== time);
      localStorage.setItem('sciHistory', JSON.stringify(filtered));
      renderHistory();
    }

    function recall(val) {
      current = val;
      justEqualed = false;
      update();
    }

    function renderHistory() {
      const el = document.getElementById('history');
      const hist = JSON.parse(localStorage.getItem('sciHistory') || '[]');
      if (hist.length === 0) {
        el.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:0.5rem;">No calculations yet</div>';
        return;
      }
      el.innerHTML = hist.slice(0, 20).map(item => `
        <div class="history-item">
          <div class="expr" onclick="recall('${item.result}')">${item.expr}</div>
          <div class="result" onclick="recall('${item.result}')">= ${item.result}</div>
          <button class="hist-del" onclick="event.stopPropagation();deleteHistory(${item.time})">×</button>
        </div>
      `).join('');
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playClick() {
      if (localStorage.getItem('soundEnabled') === 'true') {
        try {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 600;
          gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.05);
        } catch (e) {}
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') digit(e.key);
      if (e.key === '.') decimal();
      if (e.key === '+' || e.key === '-') operator(e.key);
      if (e.key === '*' || e.key === '/') operator(e.key);
      if (e.key === 'Enter' || e.key === '=') equals();
      if (e.key === 'Escape') clearAll();
      if (e.key === 'Backspace') backspace();
    });

    renderHistory();
    update();
  </script>
</body>
</html>
